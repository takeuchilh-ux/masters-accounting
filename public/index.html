<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ホーム | 小口精算システム</title>
  <link rel="icon" href="/favicon.png" type="image/png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 min-h-screen pb-20 md:pb-0">

<div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-40 hidden" onclick="closeSidebar()"></div>
<aside id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-blue-900 text-white z-50 flex flex-col shadow-2xl" style="transform:translateX(-100%);transition:transform .25s ease">
  <div class="flex items-center justify-between px-4 py-4 border-b border-blue-700/50">
    <div class="flex items-center gap-2">
      <svg class="w-8 h-8 flex-shrink-0" viewBox="0 0 28 28"><rect width="28" height="28" rx="5" fill="white"/><text x="14" y="20" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#1d4ed8" text-anchor="middle">MS</text></svg>
      <div><p class="font-bold text-sm">マスターズスタッフ</p><p class="text-blue-300 text-xs">小口精算システム</p></div>
    </div>
    <button onclick="closeSidebar()" class="p-1.5 rounded hover:bg-blue-700 text-blue-300 hover:text-white">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="px-4 py-2 border-b border-blue-800/50"><p id="sb-email" class="text-xs text-blue-300 truncate"></p></div>
  <nav class="flex-1 p-3 space-y-1 overflow-y-auto">
    <a href="index.html" class="sidebar-link active"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>ホーム</a>
    <a href="petty-cash.html" class="sidebar-link"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>小口精算</a>
    <a href="master.html" class="sidebar-link"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>マスタ設定</a>
  </nav>
  <div class="p-3 border-t border-blue-800/50">
    <button onclick="logout()" class="w-full flex items-center gap-2 px-3 py-2 rounded-lg text-blue-300 hover:bg-blue-800 hover:text-white text-sm transition-colors">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
      ログアウト
    </button>
  </div>
</aside>

<header class="bg-blue-700 text-white shadow-md sticky top-0 z-30">
  <div class="flex items-center justify-between px-4 py-3">
    <div class="flex items-center gap-3">
      <button onclick="openSidebar()" class="p-1.5 rounded-lg hover:bg-blue-600 transition-colors">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <svg class="w-7 h-7" viewBox="0 0 28 28"><rect width="28" height="28" rx="5" fill="white"/><text x="14" y="20" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#1d4ed8" text-anchor="middle">MS</text></svg>
      <span class="font-bold">小口精算システム</span>
    </div>
    <span id="user-email" class="text-blue-200 text-xs truncate max-w-32 hidden md:block"></span>
  </div>
</header>

<main class="max-w-5xl mx-auto px-4 py-6">
  <!-- 月フィルター -->
  <div class="flex items-center gap-3 mb-6">
    <label class="text-sm font-medium text-gray-600">集計月</label>
    <input type="month" id="filter-month" class="form-input w-40" onchange="loadSummary()">
    <button onclick="clearMonth()" class="text-sm text-blue-600 hover:underline">全期間</button>
  </div>

  <!-- サマリーカード -->
  <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-8">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
      <p class="text-xs text-gray-400 mb-1">総件数</p>
      <p id="card-count" class="text-3xl font-bold text-blue-700">—</p>
      <p class="text-xs text-gray-400 mt-1">件</p>
    </div>
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
      <p class="text-xs text-gray-400 mb-1">合計金額（税込）</p>
      <p id="card-total" class="text-2xl font-bold text-blue-700">—</p>
      <p class="text-xs text-gray-400 mt-1">円</p>
    </div>
    <div class="bg-blue-600 text-white rounded-2xl shadow-sm p-5 col-span-2 md:col-span-1 flex items-center justify-between cursor-pointer hover:bg-blue-700 transition-colors" onclick="location.href='petty-cash.html?new=1'">
      <div>
        <p class="text-blue-100 text-xs mb-1">レシートを登録する</p>
        <p class="font-bold text-lg">新規入力 →</p>
      </div>
      <svg class="w-12 h-12 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v16m8-8H4"/></svg>
    </div>
  </div>

  <!-- 事業所別カード -->
  <div class="mb-8">
    <h2 class="text-sm font-semibold text-gray-500 mb-3">事業所別集計</h2>
    <div id="store-cards" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3"></div>
  </div>

  <!-- 勘定科目別グラフ -->
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
    <h2 class="text-sm font-semibold text-gray-500 mb-4">勘定科目別 支出 TOP10</h2>
    <div id="account-chart" class="space-y-3"></div>
  </div>
</main>

<!-- ボトムナビ（スマホ） -->
<nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex md:hidden z-30 safe-bottom">
  <a href="index.html" class="flex-1 flex flex-col items-center py-2 text-blue-600">
    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    <span class="text-xs mt-0.5 font-medium">ホーム</span>
  </a>
  <a href="petty-cash.html" class="flex-1 flex flex-col items-center py-2 text-gray-400">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
    <span class="text-xs mt-0.5">一覧</span>
  </a>
  <a href="petty-cash.html?new=1" class="flex-1 flex flex-col items-center py-2 text-gray-400">
    <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center shadow-md">
      <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
    </div>
    <span class="text-xs mt-0.5">新規</span>
  </a>
  <a href="master.html" class="flex-1 flex flex-col items-center py-2 text-gray-400">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
    <span class="text-xs mt-0.5">設定</span>
  </a>
</nav>

<script>
async function checkAuth() {
  try {
    const r = await fetch('/api/me');
    if (!r.ok) { location.href = '/login.html'; return; }
    const d = await r.json();
    document.getElementById('user-email').textContent = d.email;
    document.getElementById('sb-email').textContent = d.email;
  } catch { location.href = '/login.html'; }
}
async function logout() {
  await fetch('/api/logout', { method: 'POST' });
  location.href = '/login.html';
}
function openSidebar() {
  document.getElementById('sidebar').style.transform = 'translateX(0)';
  document.getElementById('sidebar-overlay').classList.remove('hidden');
}
function closeSidebar() {
  document.getElementById('sidebar').style.transform = 'translateX(-100%)';
  document.getElementById('sidebar-overlay').classList.add('hidden');
}
function clearMonth() {
  document.getElementById('filter-month').value = '';
  loadSummary();
}
async function loadSummary() {
  const month = document.getElementById('filter-month').value;
  const params = month ? `?month=${month}` : '';
  try {
    const r = await fetch('/api/summary' + params);
    const d = await r.json();
    document.getElementById('card-count').textContent = d.count.toLocaleString();
    document.getElementById('card-total').textContent = '¥' + (d.total || 0).toLocaleString();

    const colors = [['blue-50','blue-100','blue-500','blue-700'],['indigo-50','indigo-100','indigo-500','indigo-700'],['violet-50','violet-100','violet-500','violet-700'],['purple-50','purple-100','purple-500','purple-700'],['fuchsia-50','fuchsia-100','fuchsia-500','fuchsia-700'],['pink-50','pink-100','pink-500','pink-700']];
    document.getElementById('store-cards').innerHTML = d.byStore.length ? d.byStore.map((s, i) => {
      const [bg, border, bar, text] = colors[i % colors.length];
      return `<div class="bg-${bg} border border-${border} rounded-2xl p-4 cursor-pointer hover:shadow-md transition-all" onclick="location.href='petty-cash.html?store=${encodeURIComponent(s.store)}'">
        <p class="text-xs text-${text} font-medium truncate leading-tight">${s.store}</p>
        <p class="text-2xl font-bold text-${text} mt-2">${s.count}<span class="text-sm font-normal">件</span></p>
        <p class="text-xs text-${bar} mt-1">¥${(s.total||0).toLocaleString()}</p>
      </div>`;
    }).join('') : '<p class="text-sm text-gray-400 col-span-full py-4 text-center">データがありません</p>';

    const max = d.byAccount[0]?.total || 1;
    document.getElementById('account-chart').innerHTML = d.byAccount.length ? d.byAccount.map(a =>
      `<div class="flex items-center gap-3">
        <span class="text-xs text-gray-600 w-28 flex-shrink-0 truncate">${a.account_category}</span>
        <div class="flex-1 bg-gray-100 rounded-full h-5 overflow-hidden">
          <div class="h-full bg-blue-500 rounded-full" style="width:${Math.max(4,(a.total/max)*100).toFixed(1)}%"></div>
        </div>
        <span class="text-xs font-medium text-gray-700 w-24 text-right flex-shrink-0">¥${(a.total||0).toLocaleString()}</span>
      </div>`
    ).join('') : '<p class="text-sm text-gray-400 text-center py-4">データがありません</p>';
  } catch(e) { console.error(e); }
}

const now = new Date();
document.getElementById('filter-month').value = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
checkAuth().then(() => loadSummary());
</script>
</body>
</html>
