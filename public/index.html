<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ホーム | 小口精算システム</title>
  <link rel="icon" href="/favicon.png" type="image/png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 min-h-screen pb-20 md:pb-0">

<header class="bg-blue-700 text-white shadow-md sticky top-0 z-30">
  <div class="flex items-center justify-between px-4 py-3">
    <div class="flex items-center gap-2">
      <img src="/logo.png" alt="MS" class="h-8 w-8 object-contain flex-shrink-0">
      <span class="font-bold text-sm hidden sm:block">小口精算システム</span>
    </div>
    <nav class="hidden md:flex items-center gap-1">
      <a href="index.html" class="px-3 py-1.5 rounded-lg text-sm font-semibold bg-blue-600 text-white">ホーム</a>
      <a href="petty-cash.html" class="px-3 py-1.5 rounded-lg text-sm font-medium text-blue-100 hover:bg-blue-600 transition-colors">一覧</a>
      <a href="master.html" class="px-3 py-1.5 rounded-lg text-sm font-medium text-blue-100 hover:bg-blue-600 transition-colors">設定</a>
      <button onclick="logout()" class="ml-2 px-3 py-1.5 rounded-lg text-sm font-medium text-blue-200 hover:bg-blue-600 hover:text-white transition-colors">ログアウト</button>
    </nav>
    <span id="user-email" class="text-blue-200 text-xs truncate max-w-32 md:hidden"></span>
  </div>
</header>

<main class="max-w-5xl mx-auto px-4 py-6">
  <!-- 月フィルター -->
  <div class="flex items-center gap-2 mb-6">
    <div class="flex items-center gap-2 bg-white border border-gray-200 rounded-xl px-3 py-2 shadow-sm">
      <svg class="w-4 h-4 text-gray-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
      <span class="text-xs text-gray-400 whitespace-nowrap">集計月</span>
      <input type="month" id="filter-month" class="text-sm font-medium text-gray-700 outline-none bg-transparent" onchange="loadSummary()">
    </div>
    <button onclick="clearMonth()" class="text-xs text-blue-600 hover:text-blue-800 px-2 py-1 rounded-lg hover:bg-blue-50 transition-colors whitespace-nowrap">全期間</button>
  </div>

  <!-- サマリーカード -->
  <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-8">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
      <p class="text-xs text-gray-400 mb-1">総件数</p>
      <p id="card-count" class="text-3xl font-bold text-blue-700">—</p>
      <p class="text-xs text-gray-400 mt-1">件</p>
    </div>
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
      <p class="text-xs text-gray-400 mb-1">合計金額（税込）</p>
      <p id="card-total" class="text-2xl font-bold text-blue-700">—</p>
      <p class="text-xs text-gray-400 mt-1">円</p>
    </div>
    <div class="bg-blue-600 text-white rounded-2xl shadow-sm p-5 col-span-2 md:col-span-1 flex items-center justify-between cursor-pointer hover:bg-blue-700 transition-colors" onclick="location.href='petty-cash.html?new=1'">
      <div>
        <p class="text-blue-100 text-xs mb-1">レシートを登録する</p>
        <p class="font-bold text-lg">新規入力 →</p>
      </div>
      <svg class="w-12 h-12 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v16m8-8H4"/></svg>
    </div>
  </div>

  <!-- 事業所別カード -->
  <div class="mb-8">
    <h2 class="text-sm font-semibold text-gray-500 mb-3">事業所別集計</h2>
    <div id="store-cards" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3"></div>
  </div>

  <!-- 勘定科目別グラフ -->
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
    <h2 class="text-sm font-semibold text-gray-500 mb-4">勘定科目別 支出 TOP10</h2>
    <div id="account-chart" class="space-y-3"></div>
  </div>
</main>

<!-- ボトムナビ（スマホ） -->
<nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex md:hidden z-30" style="padding-bottom:env(safe-area-inset-bottom)">
  <a href="index.html" class="flex-1 flex flex-col items-center justify-center py-2 gap-0.5 text-blue-600">
    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    <span class="text-xs font-medium">ホーム</span>
  </a>
  <a href="petty-cash.html" class="flex-1 flex flex-col items-center justify-center py-2 gap-0.5 text-gray-400">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
    <span class="text-xs">一覧</span>
  </a>
  <a href="petty-cash.html?new=1" class="flex-1 flex flex-col items-center justify-center py-2 gap-0.5 text-gray-400">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
    <span class="text-xs">新規</span>
  </a>
  <a href="master.html" class="flex-1 flex flex-col items-center justify-center py-2 gap-0.5 text-gray-400">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
    <span class="text-xs">設定</span>
  </a>
</nav>

<script>
async function checkAuth() {
  try {
    const r = await fetch('/api/me');
    if (!r.ok) { location.href = '/login.html'; return; }
    const d = await r.json();
    document.getElementById('user-email').textContent = d.email;
  } catch { location.href = '/login.html'; }
}
async function logout() {
  await fetch('/api/logout', { method: 'POST' });
  location.href = '/login.html';
}
function clearMonth() {
  document.getElementById('filter-month').value = '';
  loadSummary();
}
async function loadSummary() {
  const month = document.getElementById('filter-month').value;
  const params = month ? `?month=${month}` : '';
  try {
    const r = await fetch('/api/summary' + params);
    const d = await r.json();
    document.getElementById('card-count').textContent = d.count.toLocaleString();
    document.getElementById('card-total').textContent = '¥' + (d.total || 0).toLocaleString();

    const colors = [
      {bg:'#eff6ff',border:'#bfdbfe',text:'#1d4ed8',bar:'#3b82f6'},
      {bg:'#eef2ff',border:'#c7d2fe',text:'#4338ca',bar:'#6366f1'},
      {bg:'#f5f3ff',border:'#ddd6fe',text:'#6d28d9',bar:'#8b5cf6'},
      {bg:'#fdf4ff',border:'#f0abfc',text:'#86198f',bar:'#d946ef'},
      {bg:'#fff1f2',border:'#fecdd3',text:'#be123c',bar:'#f43f5e'},
      {bg:'#f0fdf4',border:'#bbf7d0',text:'#15803d',bar:'#22c55e'},
    ];
    document.getElementById('store-cards').innerHTML = d.byStore.length ? d.byStore.map((s, i) => {
      const c = colors[i % colors.length];
      return `<div style="background:${c.bg};border:1px solid ${c.border}" class="rounded-2xl p-4 cursor-pointer hover:shadow-md transition-all" onclick="location.href='petty-cash.html?store=${encodeURIComponent(s.store)}'">
        <p style="color:${c.text}" class="text-xs font-medium truncate leading-tight">${s.store}</p>
        <p style="color:${c.text}" class="text-2xl font-bold mt-2">${s.count}<span class="text-sm font-normal">件</span></p>
        <p style="color:${c.bar}" class="text-xs mt-1">¥${(s.total||0).toLocaleString()}</p>
      </div>`;
    }).join('') : '<p class="text-sm text-gray-400 col-span-full py-4 text-center">データがありません</p>';

    const max = d.byAccount[0]?.total || 1;
    document.getElementById('account-chart').innerHTML = d.byAccount.length ? d.byAccount.map(a =>
      `<div class="flex items-center gap-3">
        <span class="text-xs text-gray-600 w-28 flex-shrink-0 truncate">${a.account_category}</span>
        <div class="flex-1 bg-gray-100 rounded-full h-5 overflow-hidden">
          <div class="h-full bg-blue-500 rounded-full" style="width:${Math.max(4,(a.total/max)*100).toFixed(1)}%"></div>
        </div>
        <span class="text-xs font-medium text-gray-700 w-24 text-right flex-shrink-0">¥${(a.total||0).toLocaleString()}</span>
      </div>`
    ).join('') : '<p class="text-sm text-gray-400 text-center py-4">データがありません</p>';
  } catch(e) { console.error(e); }
}

const now = new Date();
document.getElementById('filter-month').value = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
checkAuth().then(() => loadSummary());
</script>
</body>
</html>
