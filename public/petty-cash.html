<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小口精算 | 小口精算システム</title>
  <link rel="icon" href="/favicon.png" type="image/png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 min-h-screen pb-20 md:pb-0">

<header class="bg-blue-700 text-white shadow-md sticky top-0 z-30">
  <div class="flex items-center justify-between px-4 py-3">
    <div class="flex items-center gap-2">
      <img src="/logo.png" alt="MS" class="h-8 w-8 object-contain flex-shrink-0">
      <span class="font-bold text-sm hidden sm:block">小口精算</span>
    </div>
    <nav class="hidden md:flex items-center gap-1">
      <a href="index.html" class="px-3 py-1.5 rounded-lg text-sm font-medium text-blue-100 hover:bg-blue-600 transition-colors">ホーム</a>
      <a href="petty-cash.html" class="px-3 py-1.5 rounded-lg text-sm font-semibold bg-blue-600 text-white">一覧</a>
      <a href="master.html" class="px-3 py-1.5 rounded-lg text-sm font-medium text-blue-100 hover:bg-blue-600 transition-colors">設定</a>
      <button onclick="logout()" class="ml-2 px-3 py-1.5 rounded-lg text-sm font-medium text-blue-200 hover:bg-blue-600 hover:text-white transition-colors">ログアウト</button>
    </nav>
    <button onclick="openWizard()" class="flex md:hidden items-center gap-1 bg-white text-blue-700 font-bold text-xs px-3 py-1.5 rounded-full shadow">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>新規
    </button>
  </div>
</header>

<!-- ====== ウィザードモーダル ====== -->
<div id="wizard-modal" class="fixed inset-0 bg-black/60 z-60 hidden flex items-end md:items-center justify-center">
  <div class="bg-white w-full max-w-lg md:rounded-2xl rounded-t-2xl shadow-2xl flex flex-col" style="max-height: min(90svh, calc(100vh - 60px))">
    <!-- ウィザードヘッダー -->
    <div class="flex items-center justify-between px-5 py-4 border-b border-gray-100">
      <div id="wizard-title" class="font-bold text-gray-800 text-lg"></div>
      <button onclick="closeWizard()" class="p-1.5 rounded-full hover:bg-gray-100 text-gray-400">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <!-- ステップインジケーター -->
    <div id="step-indicator" class="flex items-center justify-center gap-2 px-5 py-3 border-b border-gray-100">
      <div class="step-dot active" data-step="1"></div>
      <div class="h-px w-8 bg-gray-200" id="line-1-2"></div>
      <div class="step-dot" data-step="2"></div>
      <div class="h-px w-8 bg-gray-200" id="line-2-3"></div>
      <div class="step-dot" data-step="3"></div>
      <div class="h-px w-8 bg-gray-200" id="line-3-4"></div>
      <div class="step-dot" data-step="4"></div>
    </div>

    <!-- STEP 1: ファイル選択 -->
    <div id="step-1" class="flex-1 overflow-y-auto p-5">
      <p class="text-sm text-gray-500 mb-4 text-center">レシートの写真を選択してください（最大5枚）</p>
      <div id="drop-zone" class="border-2 border-dashed border-blue-300 rounded-2xl p-8 text-center cursor-pointer hover:border-blue-500 hover:bg-blue-50 transition-all" onclick="document.getElementById('file-input').click()" ondragover="e=>e.preventDefault()" ondrop="handleDrop(event)">
        <svg class="w-14 h-14 text-blue-300 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        <p class="text-blue-600 font-semibold text-base mb-1">タップして写真を選択</p>
        <p class="text-gray-400 text-xs">JPEG / PNG / HEIC（iPhone）対応</p>
        <input type="file" id="file-input" accept="image/*,.heic,.heif" multiple class="hidden" onchange="handleFiles(this.files)">
      </div>
      <div id="thumb-list" class="grid grid-cols-3 gap-2 mt-4 hidden"></div>
      <div class="mt-4 text-center hidden" id="step1-next-wrap">
        <button onclick="goStep(2)" class="btn-primary w-full py-3 rounded-xl text-base font-bold">
          AI解析スタート →
        </button>
        <p class="text-xs text-gray-400 mt-2">1枚ずつ順番に解析します</p>
      </div>
      <div class="mt-4 border-t pt-4">
        <button onclick="openManualEntry()" class="w-full py-2.5 rounded-xl border border-gray-300 text-gray-600 text-sm font-medium hover:bg-gray-50 transition-colors">
          手動で入力する
        </button>
      </div>
    </div>

    <!-- STEP 2: AI解析中 -->
    <div id="step-2" class="flex-1 overflow-y-auto p-5 hidden">
      <p class="text-sm text-gray-500 mb-4 text-center">レシートを解析しています...</p>
      <div id="ocr-progress" class="space-y-3"></div>
    </div>

    <!-- STEP 3: 確認・修正（1枚ずつ） -->
    <div id="step-3" class="flex-1 overflow-y-auto hidden">
      <div class="px-5 py-3 bg-gray-50 border-b border-gray-100 flex items-center justify-between">
        <span id="step3-counter" class="text-sm font-medium text-gray-600"></span>
        <div class="flex gap-1">
          <button id="btn-prev-card" onclick="prevCard()" class="p-1.5 rounded-lg hover:bg-gray-200 text-gray-500 disabled:opacity-30" disabled>
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
          </button>
          <button id="btn-next-card" onclick="nextCard()" class="p-1.5 rounded-lg hover:bg-gray-200 text-gray-500">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
          </button>
        </div>
      </div>
      <div id="card-form" class="p-5 space-y-3 overflow-y-auto"></div>
    </div>

    <!-- STEP 4: 確認・保存 -->
    <div id="step-4" class="flex-1 overflow-y-auto p-5 hidden">
      <p class="text-sm text-gray-500 mb-4 text-center">保存する内容を確認してください</p>
      <div id="save-list" class="space-y-2 mb-4"></div>
    </div>

    <!-- フッターボタン -->
    <div id="wizard-footer" class="px-5 py-4 border-t border-gray-100 flex gap-3">
      <button id="btn-back" onclick="wizardBack()" class="flex-1 py-3 rounded-xl border border-gray-300 text-gray-600 font-medium hidden">← 戻る</button>
      <button id="btn-save-all" onclick="saveAll()" class="flex-1 py-3 rounded-xl bg-blue-600 text-white font-bold hidden">まとめて保存</button>
    </div>
  </div>
</div>

<!-- ====== 手動入力モーダル ====== -->
<div id="manual-modal" class="fixed inset-0 bg-black/60 z-60 hidden flex items-end md:items-center justify-center">
  <div class="bg-white w-full max-w-lg md:rounded-2xl rounded-t-2xl shadow-2xl flex flex-col" style="max-height: min(90svh, calc(100vh - 60px))">
    <div class="flex items-center justify-between px-5 py-4 border-b border-gray-100">
      <h2 id="manual-title" class="font-bold text-gray-800 text-lg">新規入力</h2>
      <button onclick="closeManual()" class="p-1.5 rounded-full hover:bg-gray-100 text-gray-400">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="flex-1 overflow-y-auto p-5 space-y-3">
      <input type="hidden" id="f-id">
      <input type="hidden" id="f-receipt-image">
      <input type="hidden" id="f-receipt-drive-url">

      <!-- レシートプレビュー -->
      <div id="receipt-preview-wrap" class="hidden">
        <img id="receipt-preview-img" src="" alt="レシート" class="w-full max-h-48 object-contain rounded-xl border border-gray-200 bg-gray-50">
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="form-label">日付 <span class="text-red-500">*</span></label>
          <input type="date" id="f-date" class="form-input">
        </div>
        <div>
          <label class="form-label">No.</label>
          <input type="text" id="f-no" class="form-input" placeholder="自動">
        </div>
      </div>

      <div>
        <label class="form-label">事業所 <span class="text-red-500">*</span></label>
        <select id="f-store-sel" class="form-input" onchange="onSelChange('store')"></select>
        <input type="text" id="f-store-txt" class="form-input mt-1.5 hidden" placeholder="事業所名を入力" oninput="onTxtInput('store')">
        <button id="f-store-add" onclick="addToMaster('store')" class="hidden mt-1 text-xs text-blue-600 hover:underline"></button>
      </div>

      <div>
        <label class="form-label">購入者</label>
        <select id="f-purchaser-sel" class="form-input" onchange="onSelChange('purchaser')"></select>
        <input type="text" id="f-purchaser-txt" class="form-input mt-1.5 hidden" placeholder="購入者名を入力" oninput="onTxtInput('purchaser')">
        <button id="f-purchaser-add" onclick="addToMaster('purchaser')" class="hidden mt-1 text-xs text-blue-600 hover:underline"></button>
      </div>

      <div>
        <label class="form-label">支払先（店名）</label>
        <input type="text" id="f-payee" class="form-input" placeholder="例：イオン">
      </div>

      <div>
        <label class="form-label">品名・内容</label>
        <input type="text" id="f-item-name" class="form-input" placeholder="例：事務用品">
      </div>

      <div>
        <label class="form-label">勘定科目</label>
        <select id="f-account-sel" class="form-input" onchange="onSelChange('account_category')"></select>
        <input type="text" id="f-account-txt" class="form-input mt-1.5 hidden" placeholder="勘定科目を入力" oninput="onTxtInput('account_category')">
        <button id="f-account-add" onclick="addToMaster('account_category')" class="hidden mt-1 text-xs text-blue-600 hover:underline"></button>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="form-label">数量</label>
          <input type="number" id="f-qty" class="form-input" min="0" step="1" oninput="calcFromQty()">
        </div>
        <div>
          <label class="form-label">単価（円）</label>
          <input type="number" id="f-unit" class="form-input" min="0" step="1" oninput="calcFromQty()">
        </div>
      </div>

      <!-- 税率別内訳 -->
      <div class="bg-blue-50 rounded-xl p-4 space-y-3">
        <p class="text-xs font-semibold text-blue-700">税率別内訳（レシートに記載がある場合のみ入力）</p>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="form-label text-xs">10%対象 税抜金額</label>
            <input type="number" id="f-amount-10" class="form-input" min="0" oninput="calcFromRates()">
          </div>
          <div>
            <label class="form-label text-xs">消費税（10%）</label>
            <input type="number" id="f-tax-10" class="form-input" min="0" oninput="calcTotalFromTax()">
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="form-label text-xs">8%対象 税抜金額</label>
            <input type="number" id="f-amount-8" class="form-input" min="0" oninput="calcFromRates()">
          </div>
          <div>
            <label class="form-label text-xs">消費税（8%）</label>
            <input type="number" id="f-tax-8" class="form-input" min="0" oninput="calcTotalFromTax()">
          </div>
        </div>
      </div>

      <div>
        <label class="form-label font-semibold text-gray-800">合計金額（税込）</label>
        <input type="number" id="f-total" class="form-input text-lg font-bold" min="0" placeholder="0">
      </div>

      <div>
        <label class="form-label">税区分</label>
        <select id="f-tax-cat-sel" class="form-input" onchange="onSelChange('tax_category')"></select>
        <input type="text" id="f-tax-cat-txt" class="form-input mt-1.5 hidden" placeholder="税区分を入力" oninput="onTxtInput('tax_category')">
        <button id="f-tax-cat-add" onclick="addToMaster('tax_category')" class="hidden mt-1 text-xs text-blue-600 hover:underline"></button>
      </div>

      <div>
        <label class="form-label">登録番号</label>
        <input type="text" id="f-regno" class="form-input" placeholder="T1234567890123（なければ空欄）">
      </div>

      <div>
        <label class="form-label">備考</label>
        <input type="text" id="f-notes" class="form-input" placeholder="メモ">
      </div>
    </div>
    <div class="px-5 py-4 border-t border-gray-100 flex gap-3">
      <button onclick="closeManual()" class="flex-1 py-3 rounded-xl border border-gray-300 text-gray-600 font-medium">キャンセル</button>
      <button onclick="submitForm()" class="flex-1 py-3 rounded-xl bg-blue-600 text-white font-bold">保存する</button>
    </div>
  </div>
</div>

<!-- ====== レシートプレビューモーダル ====== -->
<div id="receipt-modal" class="fixed inset-0 bg-black/80 z-70 hidden flex items-start justify-center pt-16 px-4" onclick="closeReceiptModal()">
  <div class="bg-white rounded-2xl shadow-2xl max-w-sm w-full overflow-hidden" onclick="e=>e.stopPropagation()">
    <div class="flex items-center justify-between px-4 py-3 border-b">
      <div>
        <p id="receipt-modal-payee" class="font-semibold text-gray-800 text-sm"></p>
        <p id="receipt-modal-date" class="text-xs text-gray-400"></p>
      </div>
      <div class="flex gap-2">
        <a id="receipt-modal-link" href="#" target="_blank" class="text-xs text-blue-600 hover:underline">別タブで開く↗</a>
        <button onclick="closeReceiptModal()" class="p-1 rounded-full hover:bg-gray-100 text-gray-400">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
    </div>
    <img id="receipt-modal-img" src="" alt="レシート" class="w-full object-contain max-h-[60vh]">
  </div>
</div>

<!-- ====== 確認ダイアログ ====== -->
<div id="confirm-modal" class="fixed inset-0 bg-black/50 z-80 hidden flex items-center justify-center px-6">
  <div class="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-sm">
    <p id="confirm-msg" class="text-gray-800 text-sm font-medium mb-5 text-center"></p>
    <div class="flex gap-3">
      <button id="confirm-cancel" class="flex-1 py-2.5 rounded-xl border border-gray-200 text-gray-600 text-sm font-medium hover:bg-gray-50">キャンセル</button>
      <button id="confirm-ok" class="flex-1 py-2.5 rounded-xl bg-red-500 text-white text-sm font-semibold hover:bg-red-600">削除</button>
    </div>
  </div>
</div>

<!-- ====== 詳細モーダル ====== -->
<div id="detail-modal" class="fixed inset-0 bg-black/60 z-50 hidden flex items-end md:items-center justify-center" onclick="closeDetailModal()">
  <div class="bg-white w-full max-w-lg md:rounded-2xl rounded-t-2xl shadow-2xl overflow-y-auto" style="max-height: min(90svh, calc(100vh - 60px))" onclick="event.stopPropagation()">
    <div class="flex items-center justify-between px-5 py-4 border-b border-gray-100 sticky top-0 bg-white">
      <h2 id="dm-payee" class="font-bold text-gray-800 text-base truncate pr-4"></h2>
      <button onclick="closeDetailModal()" class="p-1.5 rounded-full hover:bg-gray-100 text-gray-400 flex-shrink-0">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <!-- レシート画像 -->
    <div id="dm-img-wrap" class="hidden px-5 pt-4">
      <img id="dm-img" src="" alt="レシート" class="w-full object-contain max-h-64 rounded-xl border border-gray-100">
    </div>
    <!-- 詳細情報 -->
    <div class="px-5 py-4 space-y-3">
      <div class="flex flex-wrap gap-1.5" id="dm-tags"></div>
      <table class="w-full text-sm">
        <tbody id="dm-body" class="divide-y divide-gray-50"></tbody>
      </table>
    </div>
    <!-- アクションボタン -->
    <div class="px-5 pb-5 flex gap-2">
      <button id="dm-edit-btn" class="flex-1 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-semibold hover:bg-blue-700 transition-colors">編集</button>
      <button id="dm-del-btn" class="px-4 py-2.5 bg-red-50 text-red-500 rounded-xl text-sm font-semibold hover:bg-red-100 transition-colors">削除</button>
    </div>
  </div>
</div>

<!-- ====== 一覧ページ ====== -->
<main class="max-w-6xl mx-auto px-4 py-5">
  <!-- フィルターバー -->
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 mb-5">
    <div class="flex flex-wrap gap-2">
      <select id="fil-store" class="form-input flex-1 min-w-36" onchange="loadList()">
        <option value="">すべての事業所</option>
      </select>
      <select id="fil-account" class="form-input flex-1 min-w-36" onchange="loadList()">
        <option value="">すべての勘定科目</option>
      </select>
      <div class="flex items-center gap-1 flex-1 min-w-44 border border-gray-300 rounded-lg px-2 bg-white">
        <span class="text-xs text-gray-400 whitespace-nowrap">開始</span>
        <input type="date" id="fil-from" class="flex-1 text-sm py-2 outline-none min-w-0" onchange="loadList()">
      </div>
      <div class="flex items-center gap-1 flex-1 min-w-44 border border-gray-300 rounded-lg px-2 bg-white">
        <span class="text-xs text-gray-400 whitespace-nowrap">終了</span>
        <input type="date" id="fil-to" class="flex-1 text-sm py-2 outline-none min-w-0" onchange="loadList()">
      </div>
      <input type="text" id="fil-q" class="form-input flex-1 min-w-48" placeholder="🔍 支払先・品名で検索" oninput="debounceLoad()">
    </div>
    <div class="flex items-center justify-between mt-3">
      <span id="list-summary" class="text-sm text-gray-500"></span>
      <div class="flex gap-2">
        <button onclick="exportCsv()" class="text-sm text-gray-500 hover:text-gray-700 flex items-center gap-1">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>CSV
        </button>
        <button onclick="clearFilters()" class="text-sm text-blue-600 hover:underline">クリア</button>
      </div>
    </div>
  </div>

  <!-- 一覧 -->
  <div id="list-container" class="space-y-3"></div>
</main>

<!-- ボトムナビ（スマホ） -->
<nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex md:hidden z-30" style="padding-bottom:env(safe-area-inset-bottom)">
  <a href="index.html" class="flex-1 flex flex-col items-center justify-center py-2 gap-0.5 text-gray-400">
    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    <span class="text-xs">ホーム</span>
  </a>
  <a href="petty-cash.html" class="flex-1 flex flex-col items-center justify-center py-2 gap-0.5 text-blue-600">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
    <span class="text-xs font-medium">一覧</span>
  </a>
  <button onclick="openWizard()" class="flex-1 flex flex-col items-center justify-center py-2 gap-0.5 text-gray-400">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
    <span class="text-xs">新規</span>
  </button>
  <a href="master.html" class="flex-1 flex flex-col items-center justify-center py-2 gap-0.5 text-gray-400">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
    <span class="text-xs">設定</span>
  </a>
</nav>

<style>
.step-dot { width:28px; height:28px; border-radius:50%; border:2px solid #d1d5db; background:white; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:bold; color:#9ca3af; }
.step-dot.active { border-color:#2563eb; background:#2563eb; color:white; }
.step-dot.done { border-color:#16a34a; background:#16a34a; color:white; }
.step-dot::before { content: attr(data-step); }
.step-dot.done::before { content: '✓'; }
#wizard-modal, #manual-modal, #receipt-modal { z-index: 60; }
</style>

<script>
// ─── 状態 ───────────────────────────────────────────────
let masterCache = {};
let wizardFiles = [];
let wizardResults = [];
let currentCardIdx = 0;
let editingId = null;
let debounceTimer = null;

const COMBO_DEFS = {
  store:            { sel: 'f-store-sel',    txt: 'f-store-txt',    add: 'f-store-add',    type: 'store' },
  purchaser:        { sel: 'f-purchaser-sel',txt: 'f-purchaser-txt',add: 'f-purchaser-add',type: 'purchaser' },
  account_category: { sel: 'f-account-sel',  txt: 'f-account-txt',  add: 'f-account-add',  type: 'account_category' },
  tax_category:     { sel: 'f-tax-cat-sel',  txt: 'f-tax-cat-txt',  add: 'f-tax-cat-add',  type: 'tax_category' },
};

// ─── マスタ読み込み ─────────────────────────────────────
async function loadMasters() {
  const types = ['store','purchaser','account_category','tax_category'];
  await Promise.all(types.map(async t => {
    try {
      const r = await fetch(`/api/masters?type=${t}`);
      const data = await r.json();
      masterCache[t] = Array.isArray(data) ? data.map(m => m.value) : [];
    } catch(e) {
      masterCache[t] = [];
    }
  }));
  // フィルター用セレクト更新
  fillFilter('fil-store', masterCache.store);
  fillFilter('fil-account', masterCache.account_category);
  // フォーム用コンボ更新
  Object.keys(COMBO_DEFS).forEach(k => fillComboSel(k));
}

function fillFilter(id, values) {
  const el = document.getElementById(id);
  const cur = el.value;
  const first = el.options[0];
  el.innerHTML = '';
  el.appendChild(first);
  values.forEach(v => {
    const o = document.createElement('option');
    o.value = o.textContent = v;
    el.appendChild(o);
  });
  if (cur) el.value = cur;
}

function fillComboSel(key) {
  const d = COMBO_DEFS[key];
  const sel = document.getElementById(d.sel);
  const cur = sel.value;
  sel.innerHTML = '<option value="">選択してください</option>';
  (masterCache[d.type] || []).forEach(v => {
    const o = document.createElement('option');
    o.value = o.textContent = v;
    sel.appendChild(o);
  });
  const custom = document.createElement('option');
  custom.value = '__custom__';
  custom.textContent = '✏️ 直接入力する...';
  sel.appendChild(custom);
  if (cur) sel.value = cur;
}

function onSelChange(key) {
  const d = COMBO_DEFS[key];
  const isCustom = document.getElementById(d.sel).value === '__custom__';
  document.getElementById(d.txt).classList.toggle('hidden', !isCustom);
  document.getElementById(d.add).classList.add('hidden');
  if (isCustom) document.getElementById(d.txt).focus();
}

function onTxtInput(key) {
  const d = COMBO_DEFS[key];
  const val = document.getElementById(d.txt).value.trim();
  const btn = document.getElementById(d.add);
  if (val && !masterCache[d.type]?.includes(val)) {
    btn.textContent = `＋「${val}」をマスタに追加`;
    btn.classList.remove('hidden');
  } else {
    btn.classList.add('hidden');
  }
}

async function addToMaster(key) {
  const d = COMBO_DEFS[key];
  const val = document.getElementById(d.txt).value.trim();
  if (!val) return;
  await fetch('/api/masters', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ type: d.type, value: val }) });
  masterCache[d.type] = [...(masterCache[d.type] || []), val];
  fillComboSel(key);
  document.getElementById(d.sel).value = val;
  document.getElementById(d.txt).classList.add('hidden');
  document.getElementById(d.add).classList.add('hidden');
}

function getComboVal(key) {
  const d = COMBO_DEFS[key];
  const sel = document.getElementById(d.sel).value;
  if (sel === '__custom__') return document.getElementById(d.txt).value.trim();
  return sel;
}

function setComboVal(key, val) {
  const d = COMBO_DEFS[key];
  const sel = document.getElementById(d.sel);
  if (!val) { sel.value = ''; return; }
  if (masterCache[d.type]?.includes(val)) {
    sel.value = val;
    document.getElementById(d.txt).classList.add('hidden');
  } else {
    sel.value = '__custom__';
    document.getElementById(d.txt).value = val;
    document.getElementById(d.txt).classList.remove('hidden');
  }
}

// ─── 計算 ──────────────────────────────────────────────
function calcFromQty() {
  const qty = parseFloat(document.getElementById('f-qty').value) || 0;
  const unit = parseFloat(document.getElementById('f-unit').value) || 0;
  if (qty > 0 && unit > 0) {
    const total = Math.round(qty * unit);
    document.getElementById('f-total').value = total;
  }
}

function calcFromRates() {
  const a10 = parseFloat(document.getElementById('f-amount-10').value) || 0;
  const a8  = parseFloat(document.getElementById('f-amount-8').value)  || 0;
  const t10 = a10 > 0 ? Math.round(a10 * 0.1) : (parseFloat(document.getElementById('f-tax-10').value) || 0);
  const t8  = a8  > 0 ? Math.round(a8  * 0.08): (parseFloat(document.getElementById('f-tax-8').value)  || 0);
  if (a10 > 0) document.getElementById('f-tax-10').value = t10;
  if (a8  > 0) document.getElementById('f-tax-8').value  = t8;
  const total = a10 + t10 + a8 + t8;
  if (total > 0) document.getElementById('f-total').value = total;
}

function calcTotalFromTax() {
  const a10 = parseFloat(document.getElementById('f-amount-10').value) || 0;
  const t10 = parseFloat(document.getElementById('f-tax-10').value)    || 0;
  const a8  = parseFloat(document.getElementById('f-amount-8').value)  || 0;
  const t8  = parseFloat(document.getElementById('f-tax-8').value)     || 0;
  const total = a10 + t10 + a8 + t8;
  if (total > 0) document.getElementById('f-total').value = total;
}

// ─── ウィザード ─────────────────────────────────────────
let currentStep = 1;

function openWizard() {
  wizardFiles = [];
  wizardResults = [];
  currentStep = 1;
  document.getElementById('wizard-modal').classList.remove('hidden');
  document.getElementById('thumb-list').classList.add('hidden');
  document.getElementById('step1-next-wrap').classList.add('hidden');
  document.getElementById('thumb-list').innerHTML = '';
  // ボタン状態をリセット
  const btnSave = document.getElementById('btn-save-all');
  btnSave.disabled = false;
  btnSave.textContent = 'まとめて保存';
  updateWizardStep(1);
}

function closeWizard() {
  document.getElementById('wizard-modal').classList.add('hidden');
}

function updateWizardStep(step) {
  currentStep = step;
  const titles = ['', 'レシートを選ぶ', 'AI解析中...', '内容を確認', '保存確認'];
  document.getElementById('wizard-title').textContent = titles[step];
  for (let i = 1; i <= 4; i++) {
    const dot = document.querySelector(`.step-dot[data-step="${i}"]`);
    dot.className = 'step-dot' + (i < step ? ' done' : i === step ? ' active' : '');
    const line = document.getElementById(`line-${i}-${i+1}`);
    if (line) line.style.background = i < step ? '#16a34a' : '#e5e7eb';
    document.getElementById(`step-${i}`).classList.toggle('hidden', i !== step);
  }
  document.getElementById('btn-back').classList.toggle('hidden', step <= 1);
  document.getElementById('btn-save-all').classList.toggle('hidden', step !== 4);
}

function wizardBack() {
  if (currentStep > 1) updateWizardStep(currentStep - 1);
}

function handleDrop(e) {
  e.preventDefault();
  handleFiles(e.dataTransfer.files);
}

function handleFiles(files) {
  const arr = Array.from(files).slice(0, 5 - wizardFiles.length);
  wizardFiles = [...wizardFiles, ...arr].slice(0, 5);
  renderThumbs();
}

function renderThumbs() {
  const wrap = document.getElementById('thumb-list');
  wrap.innerHTML = '';
  wrap.classList.remove('hidden');
  wizardFiles.forEach((f, i) => {
    const div = document.createElement('div');
    div.className = 'relative';
    const img = document.createElement('img');
    img.className = 'w-full h-24 object-cover rounded-xl border border-gray-200 bg-gray-100';
    const reader = new FileReader();
    reader.onload = e => img.src = e.target.result;
    reader.readAsDataURL(f);
    const badge = document.createElement('div');
    badge.className = 'absolute top-1 left-1 w-5 h-5 bg-blue-600 text-white text-xs rounded-full flex items-center justify-center font-bold';
    badge.textContent = i + 1;
    const del = document.createElement('button');
    del.className = 'absolute top-1 right-1 w-5 h-5 bg-red-500 text-white text-xs rounded-full flex items-center justify-center';
    del.textContent = '×';
    del.onclick = () => { wizardFiles.splice(i, 1); renderThumbs(); };
    div.append(img, badge, del);
    wrap.appendChild(div);
  });
  document.getElementById('step1-next-wrap').classList.toggle('hidden', wizardFiles.length === 0);
}

async function goStep(step) {
  if (step === 2) await runOcr();
  else updateWizardStep(step);
}

async function runOcr() {
  updateWizardStep(2);
  wizardResults = [];
  const prog = document.getElementById('ocr-progress');
  prog.innerHTML = wizardFiles.map((f, i) =>
    `<div id="ocr-row-${i}" class="flex items-center gap-3 p-3 bg-gray-50 rounded-xl">
      <span class="w-6 h-6 rounded-full bg-gray-200 flex items-center justify-center text-xs font-bold text-gray-500">${i+1}</span>
      <span class="flex-1 text-sm text-gray-700 truncate">${f.name}</span>
      <span id="ocr-status-${i}" class="text-gray-400 text-sm">待機中</span>
    </div>`
  ).join('');

  for (let i = 0; i < wizardFiles.length; i++) {
    document.getElementById(`ocr-status-${i}`).textContent = '解析中... ⏳';
    try {
      const fd = new FormData();
      fd.append('receipt', wizardFiles[i]);
      const r = await fetch('/api/ocr', { method: 'POST', body: fd });
      const d = await r.json();
      if (d.error) throw new Error(d.error);
      wizardResults.push({ ...d, _fileIdx: i, _checked: true });
      document.getElementById(`ocr-status-${i}`).textContent = '完了 ✅';
      document.getElementById(`ocr-row-${i}`).classList.add('bg-green-50');
    } catch(e) {
      wizardResults.push({ _fileIdx: i, _checked: false, _error: e.message });
      document.getElementById(`ocr-status-${i}`).textContent = 'エラー ❌';
      document.getElementById(`ocr-row-${i}`).classList.add('bg-red-50');
    }
  }
  setTimeout(() => { currentCardIdx = 0; updateWizardStep(3); renderCardForm(); }, 800);
}

async function renderCardForm() {
  // マスタが未ロードなら再取得
  if (!masterCache.store?.length && !masterCache.purchaser?.length) {
    await loadMasters();
  }
  const r = wizardResults[currentCardIdx];
  const total = wizardResults.length;
  document.getElementById('step3-counter').textContent = `${currentCardIdx + 1} / ${total} 枚`;
  document.getElementById('btn-prev-card').disabled = currentCardIdx === 0;
  const btnNext = document.getElementById('btn-next-card');
  if (currentCardIdx < total - 1) {
    btnNext.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>';
    btnNext.className = 'p-1.5 rounded-lg hover:bg-gray-200 text-gray-500';
    btnNext.onclick = () => { saveCardToResult(); nextCard(); };
  } else {
    btnNext.innerHTML = '保存確認';
    btnNext.className = 'px-4 py-1.5 rounded-full bg-blue-600 text-white text-sm font-semibold hover:bg-blue-700';
    btnNext.onclick = () => { saveCardToResult(); updateWizardStep(4); renderSaveList(); };
  }

  const today = new Date().toISOString().split('T')[0];
  const cf = document.getElementById('card-form');
  cf.innerHTML = `
    ${r._error ? `<div class="bg-red-50 text-red-600 text-sm p-3 rounded-xl mb-2">⚠️ ${r._error}</div>` : ''}
    ${r.receipt_image ? `<img src="${r.receipt_image}" class="w-full max-h-40 object-contain rounded-xl border border-gray-200 bg-gray-50 mb-2" onerror="this.style.display='none'">` : ''}
    <div class="grid grid-cols-2 gap-3">
      <div><label class="form-label">日付</label><input type="date" id="c-date-${currentCardIdx}" class="form-input" value="${r.date || today}"></div>
      <div><label class="form-label">合計金額</label><input type="number" id="c-total-${currentCardIdx}" class="form-input" value="${r.total_amount || ''}"></div>
    </div>
    <div><label class="form-label">事業所 <span class="text-red-500">*</span></label>
      <select id="c-store-${currentCardIdx}" class="form-input">
        <option value="">選択</option>
        ${(masterCache.store||[]).map(v => `<option value="${v}" ${r.store===v?'selected':''}>${v}</option>`).join('')}
      </select>
    </div>
    <div><label class="form-label">購入者</label>
      <select id="c-purchaser-${currentCardIdx}" class="form-input">
        <option value="">選択</option>
        ${(masterCache.purchaser||[]).map(v => `<option value="${v}" ${r.purchaser===v?'selected':''}>${v}</option>`).join('')}
      </select>
    </div>
    <div><label class="form-label">支払先</label><input type="text" id="c-payee-${currentCardIdx}" class="form-input" value="${r.payee || ''}"></div>
    <div><label class="form-label">品名</label><input type="text" id="c-item-${currentCardIdx}" class="form-input" value="${r.item_name || ''}"></div>
    <div><label class="form-label">勘定科目</label>
      <select id="c-account-${currentCardIdx}" class="form-input">
        <option value="">選択</option>
        ${(masterCache.account_category||[]).map(v => `<option value="${v}" ${r.account_category===v?'selected':''}>${v}</option>`).join('')}
        <option value="${r.account_category||''}" ${!(masterCache.account_category||[]).includes(r.account_category||'')?'selected':''}>${r.account_category||''}</option>
      </select>
    </div>
    <div class="bg-blue-50 rounded-xl p-3 space-y-2">
      <p class="text-xs font-semibold text-blue-700">税率別内訳</p>
      <div class="grid grid-cols-2 gap-2">
        <div><label class="form-label text-xs">10%対象 税抜</label><input type="number" id="c-a10-${currentCardIdx}" class="form-input" value="${r.amount_10||''}"></div>
        <div><label class="form-label text-xs">消費税(10%)</label><input type="number" id="c-t10-${currentCardIdx}" class="form-input" value="${r.tax_amount_10||''}"></div>
      </div>
      <div class="grid grid-cols-2 gap-2">
        <div><label class="form-label text-xs">8%対象 税抜</label><input type="number" id="c-a8-${currentCardIdx}" class="form-input" value="${r.amount_8||''}"></div>
        <div><label class="form-label text-xs">消費税(8%)</label><input type="number" id="c-t8-${currentCardIdx}" class="form-input" value="${r.tax_amount_8||''}"></div>
      </div>
    </div>
    <div><label class="form-label">登録番号</label><input type="text" id="c-regno-${currentCardIdx}" class="form-input" placeholder="T1234567890123（なければ空欄）" value="${r.registration_no||''}"></div>`;
}

function saveCardToResult() {
  const i = currentCardIdx;
  const r = wizardResults[i];
  r.date         = document.getElementById(`c-date-${i}`)?.value || '';
  r.total_amount = parseFloat(document.getElementById(`c-total-${i}`)?.value) || null;
  r.store        = document.getElementById(`c-store-${i}`)?.value || '';
  r.purchaser    = document.getElementById(`c-purchaser-${i}`)?.value || '';
  r.payee        = document.getElementById(`c-payee-${i}`)?.value || '';
  r.item_name    = document.getElementById(`c-item-${i}`)?.value || '';
  r.account_category = document.getElementById(`c-account-${i}`)?.value || '';
  r.amount_10      = parseFloat(document.getElementById(`c-a10-${i}`)?.value) || null;
  r.tax_amount_10  = parseFloat(document.getElementById(`c-t10-${i}`)?.value) || null;
  r.amount_8       = parseFloat(document.getElementById(`c-a8-${i}`)?.value)  || null;
  r.tax_amount_8   = parseFloat(document.getElementById(`c-t8-${i}`)?.value)  || null;
  r.registration_no = document.getElementById(`c-regno-${i}`)?.value.trim() || null;
}

function nextCard() {
  if (currentCardIdx < wizardResults.length - 1) {
    currentCardIdx++;
    renderCardForm();
  }
}
function prevCard() {
  if (currentCardIdx > 0) {
    saveCardToResult();
    currentCardIdx--;
    renderCardForm();
  }
}

function renderSaveList() {
  document.getElementById('save-list').innerHTML = wizardResults.map((r, i) =>
    `<label class="flex items-start gap-3 p-3 bg-gray-50 rounded-xl cursor-pointer hover:bg-gray-100">
      <input type="checkbox" class="mt-0.5 w-4 h-4 save-check" data-idx="${i}" ${r._checked && !r._error ? 'checked' : ''} ${r._error ? 'disabled' : ''}>
      <div class="flex-1 min-w-0">
        <p class="font-medium text-sm text-gray-800">${r.payee || '（支払先未入力）'}</p>
        <p class="text-xs text-gray-500">${r.date || '日付未入力'} | ${r.store || '事業所未選択'} | ¥${(r.total_amount||0).toLocaleString()}</p>
        ${r._error ? `<p class="text-xs text-red-500 mt-0.5">⚠️ ${r._error}</p>` : ''}
      </div>
    </label>`
  ).join('');
}

async function saveAll() {
  const checks = document.querySelectorAll('.save-check:checked');
  if (checks.length === 0) { showToast('保存する項目を選択してください', 'error'); return; }
  const btn = document.getElementById('btn-save-all');
  btn.disabled = true;
  btn.textContent = '保存中...';
  btn.classList.remove('hidden');
  let saved = 0, failed = 0;
  for (const ch of checks) {
    const r = wizardResults[parseInt(ch.dataset.idx)];
    try {
      const res = await fetch('/api/petty-cash', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          date: r.date, store: r.store, purchaser: r.purchaser, payee: r.payee,
          item_name: r.item_name, account_category: r.account_category,
          amount_10: r.amount_10, tax_amount_10: r.tax_amount_10,
          amount_8: r.amount_8, tax_amount_8: r.tax_amount_8,
          total_amount: r.total_amount, tax_category: r.tax_category,
          receipt_image: r.receipt_image, receipt_drive_url: r.receipt_drive_url,
          registration_no: r.registration_no || null,
        })
      });
      if (res.status === 401) { location.href = '/login.html'; return; }
      if (!res.ok) {
        const d = await res.json().catch(() => ({}));
        console.error('save error:', res.status, d);
        showToast(`保存エラー: ${d.error || res.status}`, 'error');
        failed++; continue;
      }
      saved++;
    } catch(e) { failed++; showToast(`保存エラー: ${e.message}`, 'error'); console.error(e); }
  }
  closeWizard();
  loadList();
  if (failed === 0) showToast(`${saved}件を保存しました`, 'success');
}

// ─── 手動入力モーダル ────────────────────────────────────
function openManualEntry(data) {
  editingId = data?._id || null;
  document.getElementById('manual-title').textContent = editingId ? '編集' : '新規入力';
  document.getElementById('f-id').value = editingId || '';
  document.getElementById('f-receipt-image').value = data?.receipt_image || '';
  document.getElementById('f-receipt-drive-url').value = data?.receipt_drive_url || '';
  document.getElementById('f-no').value = data?.no || '';
  document.getElementById('f-date').value = data?.date || new Date().toISOString().split('T')[0];
  document.getElementById('f-payee').value = data?.payee || '';
  document.getElementById('f-item-name').value = data?.item_name || '';
  document.getElementById('f-qty').value = data?.quantity || '';
  document.getElementById('f-unit').value = data?.unit_price || '';
  document.getElementById('f-amount-10').value = data?.amount_10 || '';
  document.getElementById('f-tax-10').value = data?.tax_amount_10 || '';
  document.getElementById('f-amount-8').value = data?.amount_8 || '';
  document.getElementById('f-tax-8').value = data?.tax_amount_8 || '';
  document.getElementById('f-total').value = data?.total_amount || '';
  document.getElementById('f-regno').value = data?.registration_no || '';
  document.getElementById('f-notes').value = data?.notes || '';
  setComboVal('store', data?.store || '');
  setComboVal('purchaser', data?.purchaser || '');
  setComboVal('account_category', data?.account_category || '');
  setComboVal('tax_category', data?.tax_category || '');
  const img = data?.receipt_image || data?.receipt_drive_url;
  document.getElementById('receipt-preview-wrap').classList.toggle('hidden', !img);
  if (img) document.getElementById('receipt-preview-img').src = img;
  closeWizard();
  document.getElementById('manual-modal').classList.remove('hidden');
}

function closeManual() {
  document.getElementById('manual-modal').classList.add('hidden');
  editingId = null;
}

async function submitForm() {
  const date = document.getElementById('f-date').value;
  if (!date) { showToast('日付を入力してください', 'error'); return; }
  const payload = {
    no: document.getElementById('f-no').value,
    date,
    store: getComboVal('store'),
    purchaser: getComboVal('purchaser'),
    payee: document.getElementById('f-payee').value,
    item_name: document.getElementById('f-item-name').value,
    account_category: getComboVal('account_category'),
    quantity: parseFloat(document.getElementById('f-qty').value) || null,
    unit_price: parseFloat(document.getElementById('f-unit').value) || null,
    amount_10: parseFloat(document.getElementById('f-amount-10').value) || null,
    tax_amount_10: parseFloat(document.getElementById('f-tax-10').value) || null,
    amount_8: parseFloat(document.getElementById('f-amount-8').value) || null,
    tax_amount_8: parseFloat(document.getElementById('f-tax-8').value) || null,
    total_amount: parseFloat(document.getElementById('f-total').value) || null,
    tax_category: getComboVal('tax_category'),
    registration_no: document.getElementById('f-regno').value.trim() || null,
    notes: document.getElementById('f-notes').value,
    receipt_image: document.getElementById('f-receipt-image').value,
    receipt_drive_url: document.getElementById('f-receipt-drive-url').value,
  };
  try {
    if (editingId) {
      await fetch(`/api/petty-cash/${editingId}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
    } else {
      await fetch('/api/petty-cash', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
    }
    closeManual();
    loadList();
  } catch(e) { showToast('保存に失敗しました', 'error'); }
}

// ─── 一覧 ──────────────────────────────────────────────
function debounceLoad() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(loadList, 400);
}

function clearFilters() {
  ['fil-store','fil-account','fil-from','fil-to'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fil-q').value = '';
  loadList();
}

async function loadList() {
  const params = new URLSearchParams();
  const store = document.getElementById('fil-store').value;
  const account = document.getElementById('fil-account').value;
  const from = document.getElementById('fil-from').value;
  const to = document.getElementById('fil-to').value;
  const q = document.getElementById('fil-q').value;
  if (store) params.set('store', store);
  if (account) params.set('account_category', account);
  if (from) params.set('from', from);
  if (to) params.set('to', to);
  if (q) params.set('q', q);
  const r = await fetch('/api/petty-cash?' + params);
  const rows = await r.json();
  const total = rows.reduce((s, r) => s + (r.total_amount || 0), 0);
  document.getElementById('list-summary').textContent = `${rows.length}件 | 合計 ¥${total.toLocaleString()}`;
  const con = document.getElementById('list-container');
  if (rows.length === 0) {
    con.innerHTML = '<div class="text-center text-gray-400 py-16"><p class="text-4xl mb-3">📋</p><p>データがありません</p><p class="text-sm mt-1">右下の＋ボタンから入力できます</p></div>';
    return;
  }
  con.innerHTML = rows.map(r => {
    const img = r.receipt_image || r.receipt_drive_url;
    const storeColors = {'藤沢事業所':'blue','藤沢市民病院':'indigo','藤沢湘南台病院':'violet','平塚市民病院':'purple','西横浜国際総合病院':'fuchsia','休日診療所':'pink'};
    const c = storeColors[r.store] || 'blue';
    return `<div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 hover:shadow-md transition-shadow cursor-pointer" onclick='showDetailModal(${JSON.stringify(r).replace(/'/g,"&#39;")})'>
      <div class="flex items-start justify-between gap-3">
        <div class="flex-1 min-w-0">
          <div class="flex flex-wrap items-center gap-1.5 mb-1.5">
            ${r.store ? `<span class="inline-block text-xs bg-${c}-100 text-${c}-700 px-2 py-0.5 rounded-full font-medium">${r.store}</span>` : ''}
            ${r.account_category ? `<span class="inline-block text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full">${r.account_category}</span>` : ''}
            ${r.purchaser ? `<span class="inline-block text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full">${r.purchaser}</span>` : ''}
          </div>
          <p class="font-semibold text-gray-800 text-sm truncate">${r.payee || '—'}</p>
          <p class="text-xs text-gray-400 mt-0.5 truncate">${r.item_name || ''}</p>
          <div class="flex items-center gap-3 mt-2">
            ${r.no ? `<span class="text-xs text-gray-400 font-mono bg-gray-50 px-1.5 py-0.5 rounded">No.${r.no}</span>` : ''}
            <span class="text-xs text-gray-400">${r.date || ''}</span>
            <span class="font-bold text-blue-700">¥${(r.total_amount || 0).toLocaleString()}</span>
            ${r.amount_10 ? `<span class="text-xs text-gray-400">10%対象:¥${r.amount_10.toLocaleString()}</span>` : ''}
            ${r.amount_8  ? `<span class="text-xs text-gray-400">8%対象:¥${r.amount_8.toLocaleString()}</span>`  : ''}
          </div>
        </div>
        <div class="flex flex-col items-end gap-2 flex-shrink-0" onclick="event.stopPropagation()">
          ${img ? `<button onclick="showReceiptModal('${img}','${(r.payee||'').replace(/'/g,"\\'")}','${r.date||''}')" class="text-blue-600 hover:text-blue-800">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
          </button>` : ''}
          <div class="flex gap-1">
            <button onclick='editRow(${JSON.stringify(r).replace(/'/g,"&#39;")})' class="p-1.5 rounded-lg text-gray-400 hover:bg-blue-50 hover:text-blue-600">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
            </button>
            <button onclick="deleteRow('${r._id}')" class="p-1.5 rounded-lg text-gray-400 hover:bg-red-50 hover:text-red-500">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function editRow(r) {
  openManualEntry(r);
}

async function deleteRow(id) {
  showConfirm('このレコードを削除しますか？', async () => {
    await fetch(`/api/petty-cash/${id}`, { method: 'DELETE' });
    loadList();
    showToast('削除しました');
  });
}

function exportCsv() {
  const params = new URLSearchParams();
  const store = document.getElementById('fil-store').value;
  const from = document.getElementById('fil-from').value;
  const to = document.getElementById('fil-to').value;
  if (store) params.set('store', store);
  if (from) params.set('from', from);
  if (to) params.set('to', to);
  location.href = '/api/petty-cash/export/csv?' + params;
}

function showDetailModal(r) {
  const storeColors = {'藤沢事業所':'#dbeafe','藤沢市民病院':'#e0e7ff','藤沢湘南台病院':'#ede9fe','平塚市民病院':'#f3e8ff','西横浜国際総合病院':'#fce7f3','休日診療所':'#fce7f3'};
  document.getElementById('dm-payee').textContent = r.payee || '—';
  // タグ
  const tags = [];
  if (r.store) tags.push(`<span style="background:${storeColors[r.store]||'#dbeafe'}" class="text-xs px-2 py-0.5 rounded-full font-medium text-blue-800">${r.store}</span>`);
  if (r.account_category) tags.push(`<span class="text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full">${r.account_category}</span>`);
  if (r.purchaser) tags.push(`<span class="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full">${r.purchaser}</span>`);
  document.getElementById('dm-tags').innerHTML = tags.join('');
  // 詳細テーブル
  const rows = [
    ['No.', r.no || '—'],
    ['日付', r.date || '—'],
    ['支払先', r.payee || '—'],
    ['品名', r.item_name || '—'],
    ['勘定科目', r.account_category || '—'],
    ['税区分', r.tax_category || '—'],
    ['10%税抜', r.amount_10 ? `¥${Number(r.amount_10).toLocaleString()}` : '—'],
    ['10%消費税', r.tax_amount_10 ? `¥${Number(r.tax_amount_10).toLocaleString()}` : '—'],
    ['8%税抜', r.amount_8 ? `¥${Number(r.amount_8).toLocaleString()}` : '—'],
    ['8%消費税', r.tax_amount_8 ? `¥${Number(r.tax_amount_8).toLocaleString()}` : '—'],
    ['合計金額', `<span class="font-bold text-blue-700 text-base">¥${Number(r.total_amount||0).toLocaleString()}</span>`],
  ].filter(([,v]) => v && v !== '—');
  document.getElementById('dm-body').innerHTML = rows.map(([k,v]) =>
    `<tr><td class="py-2 text-xs text-gray-400 w-28 pr-3">${k}</td><td class="py-2 text-sm text-gray-800">${v}</td></tr>`
  ).join('');
  // 画像
  const img = r.receipt_image || r.receipt_drive_url;
  if (img) {
    document.getElementById('dm-img').src = img;
    document.getElementById('dm-img-wrap').classList.remove('hidden');
  } else {
    document.getElementById('dm-img-wrap').classList.add('hidden');
  }
  // ボタン
  document.getElementById('dm-edit-btn').onclick = () => { closeDetailModal(); editRow(r); };
  document.getElementById('dm-del-btn').onclick = () => { closeDetailModal(); deleteRow(r._id); };
  document.getElementById('detail-modal').classList.remove('hidden');
}
function closeDetailModal() {
  document.getElementById('detail-modal').classList.add('hidden');
}

function showReceiptModal(url, payee, date) {
  document.getElementById('receipt-modal-img').src = url;
  document.getElementById('receipt-modal-payee').textContent = payee;
  document.getElementById('receipt-modal-date').textContent = date;
  document.getElementById('receipt-modal-link').href = url;
  document.getElementById('receipt-modal').classList.remove('hidden');
}
function closeReceiptModal() {
  document.getElementById('receipt-modal').classList.add('hidden');
}

function showToast(msg, type = 'success') {
  const t = document.createElement('div');
  t.className = `toast${type === 'error' ? ' error' : type === 'success' ? ' success' : ''}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function showConfirm(msg, onOk) {
  const el = document.getElementById('confirm-modal');
  document.getElementById('confirm-msg').textContent = msg;
  document.getElementById('confirm-ok').onclick = () => { el.classList.add('hidden'); onOk(); };
  document.getElementById('confirm-cancel').onclick = () => el.classList.add('hidden');
  el.classList.remove('hidden');
}async function logout() {
  await fetch('/api/logout', { method: 'POST' });
  location.href = '/login.html';
}

async function init() {
  try {
    const r = await fetch('/api/me');
    if (!r.ok) { location.href = '/login.html'; return; }
    const d = await r.json();
  } catch { location.href = '/login.html'; return; }

  await loadMasters();

  // URLパラメータ処理
  const params = new URLSearchParams(location.search);
  if (params.get('store')) document.getElementById('fil-store').value = params.get('store');
  if (params.get('new')) openWizard();

  loadList();
}

init();
</script>
