<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小口精算 | 会計管理システム</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 min-h-screen">

  <nav class="bg-indigo-700 text-white shadow-lg">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 11h.01M12 11h.01M15 11h.01M4 19h16a2 2 0 002-2V7a2 2 0 00-2-2H4a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
        <span class="text-xl font-bold">会計管理システム</span>
      </div>
      <div class="flex gap-1">
        <a href="index.html"      class="px-4 py-2 rounded-md text-sm font-medium hover:bg-indigo-600 transition-colors">ダッシュボード</a>
        <a href="petty-cash.html" class="px-4 py-2 rounded-md text-sm font-medium bg-indigo-800">小口精算</a>
        <a href="payments.html"   class="px-4 py-2 rounded-md text-sm font-medium hover:bg-indigo-600 transition-colors">会計項目別支払</a>
        <a href="master.html"     class="px-4 py-2 rounded-md text-sm font-medium hover:bg-indigo-600 transition-colors">マスタ管理</a>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 py-8">
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-2xl font-bold text-gray-800">小口精算 <span class="text-base font-normal text-gray-500">備品購入等 明細書</span></h1>
      <button onclick="openModal()" class="btn-primary flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        新規入力
      </button>
    </div>

    <!-- フィルター -->
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-4 mb-6">
      <div class="grid grid-cols-2 md:grid-cols-5 gap-3">
        <div>
          <label class="form-label">事業所</label>
          <select id="f-store" class="form-input" onchange="loadList()">
            <option value="">すべて</option>
          </select>
        </div>
        <div>
          <label class="form-label">勘定科目</label>
          <select id="f-account" class="form-input" onchange="loadList()">
            <option value="">すべて</option>
          </select>
        </div>
        <div>
          <label class="form-label">日付 From</label>
          <input type="date" id="f-from" class="form-input" onchange="loadList()">
        </div>
        <div>
          <label class="form-label">日付 To</label>
          <input type="date" id="f-to" class="form-input" onchange="loadList()">
        </div>
        <div>
          <label class="form-label">検索</label>
          <input type="text" id="f-q" class="form-input" placeholder="支払先・品名で検索..." oninput="loadList()">
        </div>
      </div>
      <div class="flex items-center justify-between mt-3">
        <p class="text-sm text-gray-500">表示件数: <span id="list-count" class="font-semibold text-gray-700">0</span> 件</p>
        <button onclick="exportCsv()" class="btn-secondary flex items-center gap-2 text-sm">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
          CSV出力
        </button>
      </div>
    </div>

    <!-- テーブル -->
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="border-b border-gray-200">
            <th class="px-3 py-3 text-left text-gray-600 whitespace-nowrap">No.</th>
            <th class="px-3 py-3 text-left text-gray-600 whitespace-nowrap">日付</th>
            <th class="px-3 py-3 text-left text-gray-600 whitespace-nowrap">事業所</th>
            <th class="px-3 py-3 text-left text-gray-600 whitespace-nowrap">支払先</th>
            <th class="px-3 py-3 text-left text-gray-600 whitespace-nowrap">品名</th>
            <th class="px-3 py-3 text-left text-gray-600 whitespace-nowrap">勘定科目</th>
            <th class="px-3 py-3 text-right text-gray-600 whitespace-nowrap">金額（税抜）</th>
            <th class="px-3 py-3 text-center text-gray-600 whitespace-nowrap">税率</th>
            <th class="px-3 py-3 text-right text-gray-600 whitespace-nowrap">合計</th>
            <th class="px-3 py-3 text-center text-gray-600 whitespace-nowrap">レシート</th>
            <th class="px-3 py-3 text-center text-gray-600 whitespace-nowrap">操作</th>
          </tr>
        </thead>
        <tbody id="list-body">
          <tr><td colspan="11" class="text-center py-10 text-gray-400">読み込み中...</td></tr>
        </tbody>
        <tfoot>
          <tr class="border-t-2 border-gray-300 bg-gray-50">
            <td colspan="6" class="px-3 py-3 text-sm font-semibold text-gray-600">合計</td>
            <td class="px-3 py-3 text-right font-semibold text-gray-800" id="sum-amount">¥0</td>
            <td></td>
            <td class="px-3 py-3 text-right font-semibold text-gray-800" id="sum-total">¥0</td>
            <td colspan="2"></td>
          </tr>
        </tfoot>
      </table>
    </div>
  </main>

  <!-- 入力モーダル -->
  <div id="modal" class="modal-backdrop hidden">
    <div class="modal-box">
      <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200">
        <h2 class="text-lg font-bold text-gray-800" id="modal-title">小口精算 新規入力</h2>
        <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="p-6">
        <!-- レシートアップロード -->
        <div class="mb-5">
          <label class="form-label mb-2">レシート写真（AIが自動解析）</label>
          <div id="drop-zone" class="drop-zone" onclick="document.getElementById('receipt-file').click()" ondragover="onDragOver(event)" ondrop="onDrop(event)" ondragleave="onDragLeave(event)">
            <svg class="w-10 h-10 text-indigo-400 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
            <p class="text-sm text-indigo-600 font-medium">クリックまたはドラッグ＆ドロップ</p>
            <p class="text-xs text-gray-400 mt-1">JPG, PNG, HEIC（iPhone）対応（最大20MB）— HEICはサーバーで自動変換</p>
          </div>
          <input type="file" id="receipt-file" accept="image/*,.heic,.heif" class="hidden" onchange="onFileSelect(event)">
          <div id="receipt-preview-wrap" class="mt-3 hidden">
            <img id="receipt-img" class="receipt-preview" src="" alt="レシートプレビュー">
            <div id="ocr-status" class="mt-2 text-xs flex items-center gap-2"></div>
          </div>
        </div>

        <form id="entry-form" onsubmit="submitForm(event)">
          <input type="hidden" id="edit-id">
          <input type="hidden" id="f-receipt-image">

          <div class="grid grid-cols-2 gap-4 mb-4">
            <div>
              <label class="form-label">No.</label>
              <input type="number" id="f-no" class="form-input" placeholder="自動">
            </div>
            <div>
              <label class="form-label">日付 <span class="text-red-500">*</span></label>
              <input type="date" id="f-date" class="form-input" required>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-4 mb-4">
            <!-- 事業所コンボボックス -->
            <div>
              <label class="form-label">事業所</label>
              <input type="text" id="f-store-form" class="form-input" list="list-store" placeholder="選択または入力">
              <datalist id="list-store"></datalist>
              <button type="button" id="btn-add-store" class="hidden mt-1 text-xs text-indigo-500 hover:text-indigo-700">＋ マスタに追加</button>
            </div>
            <!-- 支払先 -->
            <div>
              <label class="form-label">支払先（店名など）<span class="text-red-500">*</span></label>
              <input type="text" id="f-payee" class="form-input" required placeholder="例：コンビニ、ホームセンター">
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label">品名 <span class="text-red-500">*</span></label>
            <input type="text" id="f-item-name" class="form-input" required placeholder="例：文房具、清掃用品">
          </div>

          <!-- 勘定科目コンボボックス -->
          <div class="mb-4">
            <label class="form-label">勘定科目</label>
            <input type="text" id="f-account-category" class="form-input" list="list-account-category" placeholder="選択または入力（例：消耗品費）">
            <datalist id="list-account-category"></datalist>
            <button type="button" id="btn-add-account-category" class="hidden mt-1 text-xs text-indigo-500 hover:text-indigo-700">＋ マスタに追加</button>
          </div>

          <div class="grid grid-cols-3 gap-4 mb-4">
            <div>
              <label class="form-label">数量</label>
              <input type="number" id="f-qty" class="form-input" min="0" step="0.01" value="1" oninput="calcAmounts()">
            </div>
            <div>
              <label class="form-label">単価（税抜）</label>
              <input type="number" id="f-unit-price" class="form-input" min="0" step="1" oninput="calcAmounts()">
            </div>
            <div>
              <label class="form-label">金額（税抜）</label>
              <input type="number" id="f-amount" class="form-input" min="0" step="1" oninput="calcTax()">
            </div>
          </div>

          <div class="grid grid-cols-3 gap-4 mb-4">
            <div>
              <label class="form-label">税率</label>
              <select id="f-tax-rate" class="form-input" onchange="calcTax()">
                <option value="10%">10%（標準）</option>
                <option value="8%">8%（軽減税率）</option>
                <option value="0%">0%（非課税）</option>
              </select>
            </div>
            <div>
              <label class="form-label">消費税額</label>
              <input type="number" id="f-tax-amount" class="form-input" min="0" step="1">
            </div>
            <div>
              <label class="form-label">合計金額（税込）</label>
              <input type="number" id="f-total-amount" class="form-input bg-gray-50" readonly>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-4 mb-4">
            <!-- 税区分コンボボックス -->
            <div>
              <label class="form-label">税区分</label>
              <input type="text" id="f-tax-category" class="form-input" list="list-tax-category" placeholder="選択または入力">
              <datalist id="list-tax-category"></datalist>
              <button type="button" id="btn-add-tax-category" class="hidden mt-1 text-xs text-indigo-500 hover:text-indigo-700">＋ マスタに追加</button>
            </div>
            <div>
              <label class="form-label">備考</label>
              <input type="text" id="f-notes" class="form-input" placeholder="任意">
            </div>
          </div>

          <div class="flex justify-end gap-3 pt-4 border-t border-gray-100">
            <button type="button" onclick="closeModal()" class="btn-secondary">キャンセル</button>
            <button type="submit" class="btn-primary">保存</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    let masterCache = {};

    async function loadMaster(type) {
      if (masterCache[type]) return masterCache[type];
      const data = await fetch('/api/masters?type=' + type).then(r => r.json());
      masterCache[type] = data.map(d => d.value);
      return masterCache[type];
    }

    function fillDatalist(listId, values) {
      const dl = document.getElementById(listId);
      if (dl) dl.innerHTML = values.map(v => `<option value="${v.replace(/"/g,'&quot;')}">`).join('');
    }

    function initCombobox(inputId, listId, btnId, masterType) {
      const input = document.getElementById(inputId);
      const btn   = document.getElementById(btnId);
      if (!input || !btn) return;
      input.addEventListener('input', () => {
        const val = input.value.trim();
        const opts = masterCache[masterType] || [];
        btn.classList.toggle('hidden', !val || opts.includes(val));
        if (!btn.classList.contains('hidden')) btn.textContent = `＋「${val}」をマスタに追加`;
      });
      btn.addEventListener('click', async () => {
        const val = input.value.trim();
        if (!val) return;
        await fetch('/api/masters', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ type: masterType, value: val })
        });
        delete masterCache[masterType];
        const values = await loadMaster(masterType);
        fillDatalist(listId, values);
        btn.classList.add('hidden');
        showToast(`「${val}」をマスタに追加しました`, 'success');
      });
    }

    async function initMasters() {
      const [stores, accounts, taxCats] = await Promise.all([
        loadMaster('store'), loadMaster('account_category'), loadMaster('tax_category')
      ]);
      fillDatalist('list-store', stores);
      fillDatalist('list-account-category', accounts);
      fillDatalist('list-tax-category', taxCats);

      // フィルター用セレクトボックス
      const storeFilter = document.getElementById('f-store');
      stores.forEach(s => storeFilter.innerHTML += `<option>${s}</option>`);
      const accountFilter = document.getElementById('f-account');
      accounts.forEach(a => accountFilter.innerHTML += `<option>${a}</option>`);

      initCombobox('f-store-form',       'list-store',            'btn-add-store',            'store');
      initCombobox('f-account-category', 'list-account-category', 'btn-add-account-category', 'account_category');
      initCombobox('f-tax-category',     'list-tax-category',     'btn-add-tax-category',     'tax_category');
    }

    async function loadList() {
      const store   = document.getElementById('f-store').value;
      const account = document.getElementById('f-account').value;
      const from    = document.getElementById('f-from').value;
      const to      = document.getElementById('f-to').value;
      const q       = document.getElementById('f-q').value;
      const params  = new URLSearchParams();
      if (store)   params.set('store', store);
      if (account) params.set('account_category', account);
      if (from)    params.set('from', from);
      if (to)      params.set('to', to);
      if (q)       params.set('q', q);
      try {
        const data = await fetch('/api/petty-cash?' + params).then(r => r.json());
        renderList(data);
      } catch(e) { showToast('読み込みエラー', 'error'); }
    }

    function renderList(data) {
      const tbody = document.getElementById('list-body');
      document.getElementById('list-count').textContent = data.length;
      let sumAmt = 0, sumTotal = 0;
      if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="11" class="text-center py-10 text-gray-400">データがありません</td></tr>';
        document.getElementById('sum-amount').textContent = '¥0';
        document.getElementById('sum-total').textContent = '¥0';
        return;
      }
      tbody.innerHTML = data.map(r => {
        sumAmt   += r.amount || 0;
        sumTotal += r.total_amount || 0;
        return `<tr class="border-b border-gray-100 hover:bg-gray-50 transition-colors">
          <td class="px-3 py-2.5 text-gray-500">${r.no ?? '-'}</td>
          <td class="px-3 py-2.5 text-gray-700 whitespace-nowrap">${r.date ?? '-'}</td>
          <td class="px-3 py-2.5"><span class="tag tag-blue">${r.store ?? '-'}</span></td>
          <td class="px-3 py-2.5 text-gray-700 max-w-[130px] truncate">${r.payee ?? '-'}</td>
          <td class="px-3 py-2.5 text-gray-700 max-w-[130px] truncate">${r.item_name ?? '-'}</td>
          <td class="px-3 py-2.5"><span class="tag tag-green">${r.account_category ?? '-'}</span></td>
          <td class="px-3 py-2.5 text-right text-gray-700">${r.amount != null ? '¥' + Math.round(r.amount).toLocaleString() : '-'}</td>
          <td class="px-3 py-2.5 text-center"><span class="tag tag-gray">${r.tax_rate ?? '-'}</span></td>
          <td class="px-3 py-2.5 text-right font-medium text-gray-800">${r.total_amount != null ? '¥' + Math.round(r.total_amount).toLocaleString() : '-'}</td>
          <td class="px-3 py-2.5 text-center">
            ${r.receipt_image ? `<a href="${r.receipt_image}" target="_blank" class="text-indigo-500 hover:text-indigo-700 text-xs">表示</a>` : '<span class="text-gray-300 text-xs">なし</span>'}
          </td>
          <td class="px-3 py-2.5 text-center">
            <div class="flex gap-1 justify-center">
              <button onclick="editRow('${r._id}')" class="btn-edit">編集</button>
              <button onclick="deleteRow('${r._id}')" class="btn-danger">削除</button>
            </div>
          </td>
        </tr>`;
      }).join('');
      document.getElementById('sum-amount').textContent = '¥' + Math.round(sumAmt).toLocaleString();
      document.getElementById('sum-total').textContent  = '¥' + Math.round(sumTotal).toLocaleString();
    }

    function openModal() {
      document.getElementById('modal-title').textContent = '小口精算 新規入力';
      document.getElementById('entry-form').reset();
      document.getElementById('edit-id').value = '';
      document.getElementById('f-receipt-image').value = '';
      document.getElementById('f-date').value = new Date().toISOString().slice(0,10);
      document.getElementById('f-qty').value = 1;
      document.getElementById('receipt-preview-wrap').classList.add('hidden');
      document.querySelectorAll('[id^=btn-add-]').forEach(b => b.classList.add('hidden'));
      document.getElementById('modal').classList.remove('hidden');
    }
    function closeModal() { document.getElementById('modal').classList.add('hidden'); }

    async function editRow(id) {
      document.getElementById('modal-title').textContent = '小口精算 編集';
      const r = await fetch('/api/petty-cash/' + id).then(res => res.json());
      document.getElementById('edit-id').value = r._id;
      document.getElementById('f-no').value = r.no ?? '';
      document.getElementById('f-date').value = r.date ?? '';
      document.getElementById('f-store-form').value = r.store ?? '';
      document.getElementById('f-payee').value = r.payee ?? '';
      document.getElementById('f-item-name').value = r.item_name ?? '';
      document.getElementById('f-account-category').value = r.account_category ?? '';
      document.getElementById('f-qty').value = r.quantity ?? 1;
      document.getElementById('f-unit-price').value = r.unit_price ?? '';
      document.getElementById('f-amount').value = r.amount ?? '';
      document.getElementById('f-tax-rate').value = r.tax_rate ?? '10%';
      document.getElementById('f-tax-amount').value = r.tax_amount ?? '';
      document.getElementById('f-total-amount').value = r.total_amount ?? '';
      document.getElementById('f-tax-category').value = r.tax_category ?? '';
      document.getElementById('f-notes').value = r.notes ?? '';
      document.getElementById('f-receipt-image').value = r.receipt_image ?? '';
      document.querySelectorAll('[id^=btn-add-]').forEach(b => b.classList.add('hidden'));
      if (r.receipt_image) {
        document.getElementById('receipt-img').src = r.receipt_image;
        document.getElementById('ocr-status').innerHTML = '';
        document.getElementById('receipt-preview-wrap').classList.remove('hidden');
      } else {
        document.getElementById('receipt-preview-wrap').classList.add('hidden');
      }
      document.getElementById('modal').classList.remove('hidden');
    }

    async function deleteRow(id) {
      if (!confirm('この記録を削除しますか？')) return;
      await fetch('/api/petty-cash/' + id, { method: 'DELETE' });
      showToast('削除しました', 'success');
      loadList();
    }

    async function submitForm(e) {
      e.preventDefault();
      const id = document.getElementById('edit-id').value;
      const payload = {
        no: document.getElementById('f-no').value || null,
        date: document.getElementById('f-date').value,
        store: document.getElementById('f-store-form').value,
        payee: document.getElementById('f-payee').value,
        item_name: document.getElementById('f-item-name').value,
        account_category: document.getElementById('f-account-category').value,
        quantity: parseFloat(document.getElementById('f-qty').value) || null,
        unit_price: parseFloat(document.getElementById('f-unit-price').value) || null,
        amount: parseFloat(document.getElementById('f-amount').value) || null,
        tax_rate: document.getElementById('f-tax-rate').value,
        tax_amount: parseFloat(document.getElementById('f-tax-amount').value) || null,
        total_amount: parseFloat(document.getElementById('f-total-amount').value) || null,
        tax_category: document.getElementById('f-tax-category').value,
        notes: document.getElementById('f-notes').value,
        receipt_image: document.getElementById('f-receipt-image').value,
      };
      const method = id ? 'PUT' : 'POST';
      const url    = id ? '/api/petty-cash/' + id : '/api/petty-cash';
      await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
      showToast(id ? '更新しました' : '保存しました', 'success');
      closeModal();
      loadList();
    }

    function calcAmounts() {
      const qty  = parseFloat(document.getElementById('f-qty').value) || 0;
      const unit = parseFloat(document.getElementById('f-unit-price').value) || 0;
      if (qty > 0 && unit > 0) { document.getElementById('f-amount').value = Math.round(qty * unit); calcTax(); }
    }
    function calcTax() {
      const amt = parseFloat(document.getElementById('f-amount').value) || 0;
      const rate = document.getElementById('f-tax-rate').value;
      const pct = rate === '10%' ? 0.1 : rate === '8%' ? 0.08 : 0;
      const tax = Math.round(amt * pct);
      document.getElementById('f-tax-amount').value = tax;
      document.getElementById('f-total-amount').value = amt + tax;
    }

    function setOcrStatus(html) {
      const el = document.getElementById('ocr-status');
      el.innerHTML = html;
      el.classList.remove('hidden');
    }

    function onDragOver(e)  { e.preventDefault(); document.getElementById('drop-zone').classList.add('drag-over'); }
    function onDragLeave()  { document.getElementById('drop-zone').classList.remove('drag-over'); }
    function onDrop(e)      { e.preventDefault(); onDragLeave(); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); }
    function onFileSelect(e){ if (e.target.files[0]) handleFile(e.target.files[0]); }

    async function handleFile(file) {
      const isHeic = /\.(heic|heif)$/i.test(file.name) || file.type === 'image/heic' || file.type === 'image/heif';
      document.getElementById('receipt-preview-wrap').classList.remove('hidden');
      if (isHeic) {
        document.getElementById('receipt-img').src = '';
        setOcrStatus('<span class="spinner"></span> HEICをサーバーで変換・解析中...');
      } else {
        document.getElementById('receipt-img').src = URL.createObjectURL(file);
        setOcrStatus('<span class="spinner"></span> AI解析中...');
      }
      const formData = new FormData();
      formData.append('receipt', file);
      try {
        const res  = await fetch('/api/ocr', { method: 'POST', body: formData });
        const data = await res.json();
        if (data.receipt_image) {
          document.getElementById('receipt-img').src = data.receipt_image + '?t=' + Date.now();
          document.getElementById('f-receipt-image').value = data.receipt_image;
        }
        if (data.error) { setOcrStatus(`<span class="text-red-500">OCRエラー: ${data.error}</span>`); return; }

        if (data.date)               document.getElementById('f-date').value = data.date;
        if (data.payee)              document.getElementById('f-payee').value = data.payee;
        if (data.item_name)          document.getElementById('f-item-name').value = data.item_name;
        if (data.account_category)   document.getElementById('f-account-category').value = data.account_category;
        if (data.amount != null)     document.getElementById('f-amount').value = data.amount;
        if (data.tax_rate)           document.getElementById('f-tax-rate').value = data.tax_rate;
        if (data.tax_amount != null) document.getElementById('f-tax-amount').value = data.tax_amount;
        if (data.total_amount != null) document.getElementById('f-total-amount').value = data.total_amount;
        if (data.tax_category)       document.getElementById('f-tax-category').value = data.tax_category;
        if (data.amount != null)     calcTax();

        const filled = [data.payee, data.item_name, data.date, data.total_amount].filter(v => v != null).length;
        if (filled >= 2) {
          setOcrStatus('<svg class="w-4 h-4 text-green-500 inline mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg><span class="text-green-600">AI解析完了 — 内容を確認・修正してください</span>');
        } else {
          setOcrStatus('<span class="text-yellow-600">⚠ 一部の項目を読み取れませんでした。手動で補完してください。</span>');
        }
      } catch(_) { setOcrStatus('<span class="text-red-500">通信エラー。手動で入力してください。</span>'); }
    }

    function exportCsv() {
      const store   = document.getElementById('f-store').value;
      const from    = document.getElementById('f-from').value;
      const to      = document.getElementById('f-to').value;
      const params  = new URLSearchParams();
      if (store) params.set('store', store);
      if (from)  params.set('from', from);
      if (to)    params.set('to', to);
      window.location.href = '/api/petty-cash/export/csv?' + params;
    }

    function showToast(msg, type = '') {
      const t = document.createElement('div');
      t.className = `toast ${type}`;
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2800);
    }

    document.getElementById('modal').addEventListener('click', e => {
      if (e.target === document.getElementById('modal')) closeModal();
    });

    initMasters().then(() => loadList());
  </script>
</body>
</html>
