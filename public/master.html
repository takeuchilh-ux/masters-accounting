<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マスタ設定 | 小口精算システム</title>
  <link rel="icon" href="/favicon.png" type="image/png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 min-h-screen pb-20 md:pb-0">

<header class="bg-blue-700 text-white shadow-md sticky top-0 z-30">
  <div class="flex items-center justify-between px-4 py-3">
    <div class="flex items-center gap-2">
      <img src="/logo.png" alt="MS" class="h-8 w-8 object-contain flex-shrink-0">
      <span class="font-bold text-sm hidden sm:block">マスタ設定</span>
    </div>
    <nav class="hidden md:flex items-center gap-1">
      <a href="index.html" class="px-3 py-1.5 rounded-lg text-sm font-medium text-blue-100 hover:bg-blue-600 transition-colors">ホーム</a>
      <a href="petty-cash.html" class="px-3 py-1.5 rounded-lg text-sm font-medium text-blue-100 hover:bg-blue-600 transition-colors">一覧</a>
      <a href="master.html" class="px-3 py-1.5 rounded-lg text-sm font-semibold bg-blue-600 text-white">設定</a>
      <button onclick="logout()" class="ml-2 px-3 py-1.5 rounded-lg text-sm font-medium text-blue-200 hover:bg-blue-600 hover:text-white transition-colors">ログアウト</button>
    </nav>
    <span id="user-email" class="text-blue-200 text-xs truncate max-w-32 md:hidden"></span>
  </div>
</header>

<main class="max-w-2xl mx-auto px-4 py-6">

  <!-- マスタタブ群 -->
  <div id="master-section">
    <!-- タブ -->
    <div id="tab-bar" class="flex gap-1 flex-wrap mb-6 bg-white rounded-2xl shadow-sm border border-gray-100 p-2">
      <button onclick="switchTab('store')"            id="tab-store"            class="tab-btn active">事業所</button>
      <button onclick="switchTab('purchaser')"        id="tab-purchaser"        class="tab-btn">購入者</button>
      <button onclick="switchTab('account_category')" id="tab-account_category" class="tab-btn">勘定科目</button>
      <button onclick="switchTab('tax_category')"     id="tab-tax_category"     class="tab-btn">税区分</button>
      <!-- 管理者のみ表示 -->
      <button onclick="switchTab('users')" id="tab-users" class="tab-btn hidden">ユーザー管理</button>
    </div>

    <!-- マスタ追加フォーム（ユーザー管理タブ以外で表示） -->
    <div id="master-add-form" class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 mb-4">
      <div class="flex gap-2">
        <input type="text" id="new-value" class="form-input flex-1" placeholder="新しい項目を入力">
        <button onclick="addItem()" class="btn-primary px-5 py-2 rounded-xl font-bold">追加</button>
      </div>
    </div>

    <!-- ユーザー追加フォーム（ユーザー管理タブのみ表示） -->
    <div id="user-add-form" class="hidden bg-white rounded-2xl shadow-sm border border-gray-100 p-4 mb-4">
      <div class="grid grid-cols-1 gap-3">
        <div class="flex gap-2">
          <input type="text" id="new-user-name" class="form-input flex-1" placeholder="名前">
          <select id="new-user-role" class="form-input w-32">
            <option value="user">一般</option>
            <option value="admin">管理者</option>
          </select>
        </div>
        <input type="email" id="new-user-email" class="form-input" placeholder="メールアドレス">
        <div class="flex gap-2">
          <input type="password" id="new-user-password" class="form-input flex-1" placeholder="パスワード">
          <button onclick="addUser()" class="btn-primary px-5 py-2 rounded-xl font-bold whitespace-nowrap">追加</button>
        </div>
      </div>
    </div>

    <!-- 確認ダイアログ -->
    <div id="confirm-modal" class="fixed inset-0 bg-black/50 z-80 hidden flex items-center justify-center px-6">
      <div class="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-sm">
        <p id="confirm-msg" class="text-gray-800 text-sm font-medium mb-5 text-center"></p>
        <div class="flex gap-3">
          <button id="confirm-cancel" class="flex-1 py-2.5 rounded-xl border border-gray-200 text-gray-600 text-sm font-medium hover:bg-gray-50">キャンセル</button>
          <button id="confirm-ok" class="flex-1 py-2.5 rounded-xl bg-red-500 text-white text-sm font-semibold hover:bg-red-600">削除</button>
        </div>
      </div>
    </div>

    <!-- ユーザー編集モーダル -->
    <div id="user-edit-modal" class="fixed inset-0 bg-black/50 z-80 hidden flex items-center justify-center px-6">
      <div class="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-sm">
        <h3 class="text-sm font-semibold text-gray-800 mb-4">ユーザー編集</h3>
        <div class="flex flex-col gap-3 mb-5">
          <div>
            <label class="text-xs text-gray-500 mb-1 block">名前</label>
            <input type="text" id="edit-user-name" class="form-input w-full" placeholder="名前">
          </div>
          <div>
            <label class="text-xs text-gray-500 mb-1 block">メールアドレス</label>
            <input type="email" id="edit-user-email" class="form-input w-full" placeholder="メールアドレス">
          </div>
          <div>
            <label class="text-xs text-gray-500 mb-1 block">権限</label>
            <select id="edit-user-role" class="form-input w-full">
              <option value="user">一般</option>
              <option value="admin">管理者</option>
            </select>
          </div>
          <div>
            <label class="text-xs text-gray-500 mb-1 block">新しいパスワード（変更する場合のみ）</label>
            <input type="password" id="edit-user-password" class="form-input w-full" placeholder="変更しない場合は空欄">
          </div>
        </div>
        <div class="flex gap-3">
          <button onclick="closeUserEditModal()" class="flex-1 py-2.5 rounded-xl border border-gray-200 text-gray-600 text-sm font-medium hover:bg-gray-50">キャンセル</button>
          <button onclick="saveUserEdit()" class="flex-1 py-2.5 rounded-xl bg-blue-600 text-white text-sm font-semibold hover:bg-blue-700">保存</button>
        </div>
      </div>
    </div>

    <!-- リスト -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
      <div id="master-list" class="divide-y divide-gray-100"></div>
    </div>
  </div>
</main>

<!-- ボトムナビ -->
<nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex md:hidden z-30" style="padding-bottom:env(safe-area-inset-bottom)">
  <a href="index.html" class="flex-1 flex flex-col items-center justify-center py-2 gap-0.5 text-gray-400">
    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    <span class="text-xs">ホーム</span>
  </a>
  <a href="petty-cash.html" class="flex-1 flex flex-col items-center justify-center py-2 gap-0.5 text-gray-400">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
    <span class="text-xs">一覧</span>
  </a>
  <a href="petty-cash.html?new=1" class="flex-1 flex flex-col items-center justify-center py-2 gap-0.5 text-gray-400">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
    <span class="text-xs">新規</span>
  </a>
  <a href="master.html" class="flex-1 flex flex-col items-center justify-center py-2 gap-0.5 text-blue-600">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
    <span class="text-xs font-medium">設定</span>
  </a>
</nav>

<style>
.tab-btn { flex:1; min-width:0; padding:8px 4px; border-radius:10px; font-size:13px; font-weight:500; color:#6b7280; transition:all .15s; white-space:nowrap; }
.tab-btn.active { background:#2563eb; color:white; font-weight:700; }
.tab-btn:hover:not(.active) { background:#f3f4f6; }
</style>

<script>
let currentType = 'store';
let currentRole = 'user';
let pwTargetId = null;
const LABELS = { store:'事業所', purchaser:'購入者', account_category:'勘定科目', tax_category:'税区分' };

function switchTab(type) {
  currentType = type;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`tab-${type}`).classList.add('active');

  const isUsers = type === 'users';
  document.getElementById('master-add-form').classList.toggle('hidden', isUsers);
  document.getElementById('user-add-form').classList.toggle('hidden', !isUsers);
  if (!isUsers) {
    document.getElementById('new-value').placeholder = `新しい${LABELS[type]}を入力`;
  }
  loadList();
}

// ── マスタ操作 ─────────────────────────────────────────────────────
async function loadList() {
  if (currentType === 'users') { loadUsers(); return; }
  const r = await fetch(`/api/masters?type=${currentType}`);
  const rows = await r.json();
  const el = document.getElementById('master-list');
  if (rows.length === 0) {
    el.innerHTML = '<p class="text-center text-gray-400 py-8 text-sm">まだ登録がありません</p>';
    return;
  }
  el.innerHTML = rows.map((r, i) => `
    <div id="row-${r._id}" data-value="${(r.value||'').replace(/"/g,'&quot;')}" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-50">
      <span class="w-6 h-6 flex items-center justify-center rounded-full bg-blue-100 text-blue-600 text-xs font-bold flex-shrink-0">${i+1}</span>
      <span id="label-${r._id}" class="flex-1 text-sm text-gray-800">${r.value}</span>
      <div id="edit-${r._id}" class="hidden flex-1 flex gap-2">
        <input type="text" id="edit-input-${r._id}" class="form-input flex-1 py-1 text-sm" value="${(r.value||'').replace(/"/g,'&quot;')}">
        <button onclick="saveEdit('${r._id}')" class="px-3 py-1 bg-blue-600 text-white text-xs rounded-lg font-bold">保存</button>
        <button onclick="cancelEdit('${r._id}')" class="px-3 py-1 bg-gray-200 text-gray-600 text-xs rounded-lg">取消</button>
      </div>
      <div id="btns-${r._id}" class="flex gap-1">
        <button onclick="startEdit('${r._id}')" class="p-1.5 rounded-lg text-gray-400 hover:bg-blue-50 hover:text-blue-600">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
        </button>
        <button onclick="deleteItem('${r._id}')" class="p-1.5 rounded-lg text-gray-400 hover:bg-red-50 hover:text-red-500">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
        </button>
      </div>
    </div>`).join('');
}

function startEdit(id) {
  document.getElementById(`label-${id}`).classList.add('hidden');
  document.getElementById(`btns-${id}`).classList.add('hidden');
  document.getElementById(`edit-${id}`).classList.remove('hidden');
  document.getElementById(`edit-input-${id}`).focus();
}
function cancelEdit(id) {
  document.getElementById(`label-${id}`).classList.remove('hidden');
  document.getElementById(`btns-${id}`).classList.remove('hidden');
  document.getElementById(`edit-${id}`).classList.add('hidden');
}
async function saveEdit(id) {
  const val = document.getElementById(`edit-input-${id}`).value.trim();
  if (!val) return;
  await fetch(`/api/masters/${id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ value: val }) });
  showToast('保存しました');
  loadList();
}
async function addItem() {
  const val = document.getElementById('new-value').value.trim();
  if (!val) return;
  await fetch('/api/masters', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ type: currentType, value: val }) });
  document.getElementById('new-value').value = '';
  showToast('追加しました');
  loadList();
}
async function deleteItem(id) {
  const row = document.getElementById(`row-${id}`);
  const val = row?.dataset.value || '';
  showConfirm(`「${val}」を削除しますか？`, async () => {
    await fetch(`/api/masters/${id}`, { method: 'DELETE' });
    loadList();
    showToast('削除しました');
  });
}

// ── ユーザー管理 ──────────────────────────────────────────────────
async function loadUsers() {
  const r = await fetch('/api/users');
  const rows = await r.json();
  const el = document.getElementById('master-list');
  if (rows.length === 0) {
    el.innerHTML = '<p class="text-center text-gray-400 py-8 text-sm">ユーザーがいません</p>';
    return;
  }
  el.innerHTML = rows.map(u => `
    <div class="flex items-center gap-3 px-4 py-3 hover:bg-gray-50">
      <div class="w-9 h-9 rounded-full flex items-center justify-center flex-shrink-0 font-bold text-sm ${u.role === 'admin' ? 'bg-blue-100 text-blue-600' : 'bg-gray-100 text-gray-500'}">
        ${(u.name || u.email)[0].toUpperCase()}
      </div>
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2">
          <span class="text-sm font-medium text-gray-800 truncate">${u.name || '（名前未設定）'}</span>
          <span class="text-xs px-2 py-0.5 rounded-full font-medium ${u.role === 'admin' ? 'bg-blue-100 text-blue-700' : 'bg-gray-100 text-gray-500'}">${u.role === 'admin' ? '管理者' : '一般'}</span>
        </div>
        <div class="text-xs text-gray-400 truncate">${u.email}</div>
      </div>
      <div class="flex gap-1 flex-shrink-0">
        <button onclick='openUserEditModal(${JSON.stringify(u).replace(/'/g,"&#39;")})' class="p-1.5 rounded-lg text-gray-400 hover:bg-blue-50 hover:text-blue-600" title="編集">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
        </button>
        <button onclick="deleteUser('${u._id}','${(u.name||u.email).replace(/'/g,'')}')" class="p-1.5 rounded-lg text-gray-400 hover:bg-red-50 hover:text-red-500" title="削除">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
        </button>
      </div>
    </div>`).join('');
}

async function addUser() {
  const name  = document.getElementById('new-user-name').value.trim();
  const email = document.getElementById('new-user-email').value.trim();
  const pw    = document.getElementById('new-user-password').value;
  const role  = document.getElementById('new-user-role').value;
  if (!email || !pw) { showToast('メールとパスワードは必須です', 'error'); return; }
  const r = await fetch('/api/users', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ name, email, password: pw, role }) });
  const d = await r.json();
  if (!r.ok) { showToast(d.error || '追加に失敗しました', 'error'); return; }
  document.getElementById('new-user-name').value = '';
  document.getElementById('new-user-email').value = '';
  document.getElementById('new-user-password').value = '';
  showToast('ユーザーを追加しました');
  loadUsers();
}

let editTargetId = null;

function openUserEditModal(u) {
  editTargetId = u._id;
  document.getElementById('edit-user-name').value     = u.name  || '';
  document.getElementById('edit-user-email').value    = u.email || '';
  document.getElementById('edit-user-role').value     = u.role  || 'user';
  document.getElementById('edit-user-password').value = '';
  document.getElementById('user-edit-modal').classList.remove('hidden');
}

function closeUserEditModal() {
  document.getElementById('user-edit-modal').classList.add('hidden');
  editTargetId = null;
}

async function saveUserEdit() {
  const name     = document.getElementById('edit-user-name').value.trim();
  const email    = document.getElementById('edit-user-email').value.trim();
  const role     = document.getElementById('edit-user-role').value;
  const password = document.getElementById('edit-user-password').value;
  if (!email) { showToast('メールアドレスは必須です', 'error'); return; }
  const body = { name, email, role };
  if (password) body.password = password;
  const r = await fetch(`/api/users/${editTargetId}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
  const d = await r.json();
  if (!r.ok) { showToast(d.error || '更新に失敗しました', 'error'); return; }
  closeUserEditModal();
  showToast('保存しました');
  loadUsers();
}

async function deleteUser(id, name) {
  showConfirm(`「${name}」を削除しますか？`, async () => {
    const r = await fetch(`/api/users/${id}`, { method:'DELETE' });
    const d = await r.json();
    if (!r.ok) { showToast(d.error || '削除に失敗しました', 'error'); return; }
    showToast('削除しました');
    loadUsers();
  });
}

// ── 共通UI ───────────────────────────────────────────────────────
function showConfirm(msg, onOk, okLabel = '削除') {
  const el = document.getElementById('confirm-modal');
  document.getElementById('confirm-msg').textContent = msg;
  document.getElementById('confirm-ok').textContent = okLabel;
  document.getElementById('confirm-ok').onclick = () => { el.classList.add('hidden'); onOk(); };
  document.getElementById('confirm-cancel').onclick = () => el.classList.add('hidden');
  el.classList.remove('hidden');
}

function showToast(msg, type = 'success') {
  const t = document.createElement('div');
  t.className = `toast${type === 'error' ? ' error' : type === 'success' ? ' success' : ''}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

async function logout() {
  await fetch('/api/logout', { method: 'POST' });
  location.href = '/login.html';
}

async function init() {
  try {
    const r = await fetch('/api/me');
    if (!r.ok) { location.href = '/login.html'; return; }
    const d = await r.json();
    currentRole = d.role;
    if (d.role === 'admin') {
      document.getElementById('tab-users').classList.remove('hidden');
    }
  } catch { location.href = '/login.html'; return; }
  loadList();
}
init();
</script>
</body>
</html>
