<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン | 小口精算システム</title>
  <link rel="icon" href="/favicon.png" type="image/png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-600 to-blue-800 flex items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <!-- ロゴ -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-20 h-20 bg-white rounded-2xl shadow-xl mb-4">
        <img src="/logo.png" alt="MS" class="w-14 h-14 object-contain">
      </div>
      <h1 class="text-white text-2xl font-bold">マスターズスタッフ</h1>
      <p class="text-blue-200 text-sm mt-1">小口精算システム</p>
    </div>

    <!-- カード -->
    <div class="bg-white rounded-3xl shadow-2xl p-8">
      <h2 class="text-gray-800 text-lg font-bold mb-6 text-center">ログイン</h2>
      <div id="error-msg" class="hidden bg-red-50 text-red-600 text-sm p-3 rounded-xl mb-4 text-center"></div>
      <div class="space-y-4">
        <div>
          <label class="form-label">メールアドレス</label>
          <input type="email" id="email" class="form-input" placeholder="example@mail.com" autocomplete="email">
        </div>
        <div>
          <label class="form-label">パスワード</label>
          <input type="password" id="password" class="form-input" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()">
        </div>
        <button onclick="login()" id="login-btn" class="w-full py-3.5 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl transition-colors text-base mt-2">
          ログイン
        </button>
      </div>
    </div>
    <p class="text-center text-blue-200 text-xs mt-6">© マスターズスタッフ株式会社</p>
  </div>

<script>
async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('error-msg');
  err.classList.add('hidden');
  if (!email || !password) { err.textContent = 'メールアドレスとパスワードを入力してください'; err.classList.remove('hidden'); return; }
  btn.disabled = true;
  btn.textContent = 'ログイン中...';
  try {
    const r = await fetch('/api/login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ email, password })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'ログイン失敗');
    location.href = '/index.html';
  } catch(e) {
    err.textContent = e.message;
    err.classList.remove('hidden');
    btn.disabled = false;
    btn.textContent = 'ログイン';
  }
}

// すでにログイン済みならリダイレクト
fetch('/api/me').then(r => { if (r.ok) location.href = '/index.html'; }).catch(()=>{});
</script>
</body>
</html>
